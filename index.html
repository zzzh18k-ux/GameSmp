<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xchange Elite | Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://adsgram.ai/sdk.js"></script>
    <style>
        :root { --bg: #000; --card: #111; --accent: #24a1de; --text: #fff; --sec: #8e8e93; --brd: rgba(255,255,255,0.08); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 15px; padding-bottom: 90px; }
        
        .radar { background: var(--card); border: 1px solid var(--brd); border-radius: 12px; padding: 10px; display: flex; justify-content: space-around; margin-bottom: 15px; }
        .stat { text-align: center; }
        .stat-n { display: block; font-weight: 800; color: var(--accent); font-size: 14px; }
        .stat-t { font-size: 8px; text-transform: uppercase; color: var(--sec); }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .lang-s { background: var(--card); border: 1px solid var(--brd); color: #fff; padding: 5px; border-radius: 8px; font-size: 12px; }

        .box { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--brd); margin-bottom: 20px; }
        .lbl { font-size: 10px; font-weight: 700; color: var(--sec); text-transform: uppercase; margin-bottom: 8px; display: block; }
        
        .s-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 15px; }
        .s-btn { aspect-ratio: 1/1; background: #1c1c1e; border: 1px solid var(--brd); border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .s-btn svg { width: 20px; fill: var(--sec); }
        .s-btn.active { border-color: var(--accent); background: rgba(36,161,222,0.15); }
        .s-btn.active svg { fill: var(--accent); }

        input, textarea { width: 100%; background: #1c1c1e; border: 1px solid var(--brd); border-radius: 12px; padding: 12px; color: #fff; margin-bottom: 12px; outline: none; }
        .btn-p { background: var(--accent); color: #fff; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; }

        .card { background: var(--card); border-radius: 15px; padding: 15px; border: 1px solid var(--brd); margin-bottom: 10px; }
        .c-top { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .u-tag { color: var(--accent); font-weight: 700; font-size: 13px; }
        .p-pill { background: rgba(255,255,255,0.05); padding: 3px 8px; border-radius: 6px; font-size: 9px; color: var(--sec); font-weight: 800; }
        .btn-c { background: #fff; color: #000; padding: 8px 15px; border-radius: 10px; font-size: 12px; font-weight: 700; text-decoration: none; }

        .nav { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: rgba(17,17,17,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--brd); }
        .nav-a { text-align: center; color: var(--sec); text-decoration: none; font-size: 10px; }
        .nav-a svg { width: 22px; display: block; margin: 0 auto 3px; fill: var(--sec); }
        .nav-a.active { color: var(--accent); }
        .nav-a.active svg { fill: var(--accent); }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #fff; color: #000; padding: 10px 20px; border-radius: 20px; font-weight: 700; transition: 0.4s; z-index: 9999; }
        #toast.v { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div id="toast">OFERTA ENVIADA</div>

<div class="radar">
    <div class="stat"><span class="stat-n">1,452</span><span class="stat-t" id="l-u">Usuarios</span></div>
    <div class="stat"><span class="stat-n" id="count-t">0</span><span class="stat-t" id="l-t">Tratos</span></div>
    <div class="stat"><span class="stat-n" style="color:#4cd964">ON</span><span class="stat-t" id="l-s">Server</span></div>
</div>

<header class="header">
    <div style="font-weight:800; font-size:18px">Xchange Elite</div>
    <select class="lang-s" id="l-sel">
        <option value="es">🇪🇸 ES</option>
        <option value="en">🇺🇸 EN</option>
    </select>
</header>

<div class="box">
    <span class="lbl" id="l-ch">Canal</span>
    <div class="s-grid">
        <div class="s-btn active" onclick="setPlat('tg', this)"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8l-1.13 7.19c-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-3.53 2.39-5.35 3.6-5.46 3.62-.51.35-.98.52-1.4.51-.46-.01-1.35-.26-2.01-.48-.81-.27-1.45-.42-1.39-.89.03-.25.38-.51 1.05-.78 1.37-.58 4.12-1.76 8.24-3.55 3.92-1.66 4.73-1.95 5.27-1.96.12 0 .38.03.55.17.14.12.18.28.19.39 0 .14 0 .28-.01.41z"/></svg></div>
        <div class="s-btn" onclick="setPlat('ig', this)"><svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg></div>
    </div>
    <span class="lbl" id="l-co">Contacto</span>
    <input type="text" id="u-id" placeholder="@usuario">
    <span class="lbl" id="l-ms">Mensaje</span>
    <textarea id="u-ms" rows="2" placeholder="Tu oferta..."></textarea>
    <button class="btn-p" onclick="publish()" id="l-btn">PUBLICAR</button>
</div>

<div id="feed"></div>

<nav class="nav">
    <a href="#" class="nav-a active"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>INICIO</a>
    <a href="https://t.me/XchangeEliteOficial" class="nav-a"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8l-1.13 7.19c-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-3.53 2.39-5.35 3.6-5.46 3.62-.51.35-.98.52-1.4.51-.46-.01-1.35-.26-2.01-.48-.81-.27-1.45-.42-1.39-.89.03-.25.38-.51 1.05-.78 1.37-.58 4.12-1.76 8.24-3.55 3.92-1.66 4.73-1.95 5.27-1.96.12 0 .38.03.55.17.14.12.18.28.19.39 0 .14 0 .28-.01.41z"/></svg>CANAL</a>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, query, orderByChild } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

    const conf = { databaseURL: "https://fruithunter-b5d2d-default-rtdb.firebaseio.com" };
    const app = initializeApp(conf);
    const db = getDatabase(app);
    let plat = 'tg';

    const lang = {
        es: { u:"Usuarios", t:"Tratos Hoy", s:"Servidor", ch:"Canal Enlace", co:"ID Contacto", ms:"Propuesta", btn:"PUBLICAR", toast:"OFERTA ENVIADA", con:"CONTACTAR" },
        en: { u:"Users", t:"Deals Today", s:"Server", ch:"Link Channel", co:"Contact ID", ms:"Proposal", btn:"PUBLISH", toast:"OFFER SENT", con:"CONTACT" }
    };

    window.setPlat = (p, el) => {
        document.querySelectorAll('.s-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active'); plat = p;
    };

    document.getElementById('l-sel').onchange = (e) => {
        const l = lang[e.target.value];
        document.getElementById('l-u').innerText = l.u;
        document.getElementById('l-t').innerText = l.t;
        document.getElementById('l-s').innerText = l.s;
        document.getElementById('l-ch').innerText = l.ch;
        document.getElementById('l-co').innerText = l.co;
        document.getElementById('l-ms').innerText = l.ms;
        document.getElementById('l-btn').innerText = l.btn;
        document.getElementById('toast').innerText = l.toast;
        render();
    };

    window.publish = () => {
        const u = document.getElementById('u-id').value;
        const m = document.getElementById('u-ms').value;
        if(!u || !m) return;
        
        if(window.Adsgram) window.Adsgram.init({ blockId: "18897" }).show().catch(()=>{});

        push(ref(db, 'elite_trades_v2'), {
            u, m, p: plat, t: Date.now(), v: Math.floor(Math.random()*400)+80
        }).then(() => {
            document.getElementById('u-ms').value = "";
            const t = document.getElementById('toast');
            t.classList.add('v'); setTimeout(() => t.classList.remove('v'), 2000);
        });
    };

    let data = [];
    const render = () => {
        const f = document.getElementById('feed'); f.innerHTML = "";
        const l = document.getElementById('l-sel').value;
        [...data].reverse().forEach(i => {
            f.innerHTML += `
            <div class="card">
                <div class="c-top"><span class="u-tag">${i.u}</span><span class="p-pill">ACTIVE</span></div>
                <div style="font-size:14px; margin-bottom:12px">${i.m}</div>
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <span style="font-size:10px; color:var(--sec)">👁️ ${i.v || 0} • ${i.p.toUpperCase()}</span>
                    <a href="https://t.me/${i.u.replace('@','')}" class="btn-c" target="_blank">${lang[l].con}</a>
                </div>
            </div>`;
        });
    };

    onValue(query(ref(db, 'elite_trades_v2'), orderByChild('t')), (s) => {
        data = []; s.forEach(c => data.push(c.val()));
        document.getElementById('count-t').innerText = data.length;
        render();
    });
</script>
</body>
</html>
