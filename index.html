<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X Exchange PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030305; --accent: #00f2ff; --card: rgba(255,255,255,0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        #lang-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .lang-card { background: #0a0a0a; border: 1px solid var(--accent); padding: 30px; border-radius: 30px; width: 100%; max-width: 350px; text-align: center; }
        .lang-option { background: var(--card); border: 1px solid #333; padding: 15px; border-radius: 15px; margin: 10px 0; cursor: pointer; font-weight: bold; }
        
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .logo { font-family: 'Orbitron'; color: var(--accent); font-size: 18px; }
        .live-stat { color: #00ff88; font-size: 10px; font-weight: 800; }

        .categories { display: flex; gap: 10px; overflow-x: auto; padding: 15px; background: rgba(255,255,255,0.02); scrollbar-width: none; }
        .cat-btn { background: var(--card); border: 1px solid #222; color: #888; padding: 10px 15px; border-radius: 12px; font-size: 11px; white-space: nowrap; font-weight: bold; }
        .cat-btn.active { background: var(--accent); color: #000; border: none; box-shadow: 0 0 10px var(--accent); }

        .feed { flex: 1; overflow-y: scroll; padding: 15px; padding-bottom: 100px; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .card-meta { display: flex; justify-content: space-between; font-size: 10px; color: #555; margin-top: 10px; }
        .timer { color: #ff4444; font-weight: bold; }
        
        .btn-main { background: #fff; color: #000; border: none; padding: 12px; width: 100%; border-radius: 12px; font-weight: 900; font-size: 12px; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .btn-plus { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; width: 60px; height: 60px; border-radius: 20px; font-size: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(0,242,255,0.5); z-index: 1000; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; display: none; flex-direction: column; padding: 30px; justify-content: center; }
        .modal-box { background: #0a0a0a; border: 1px solid var(--accent); padding: 25px; border-radius: 25px; }
        input, textarea { background: #111; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 15px; margin-bottom: 15px; width: 100%; font-size: 14px; outline: none; }
    </style>
</head>
<body>

    <div id="lang-overlay">
        <div class="lang-card">
            <h2 style="font-family:'Orbitron'; color:var(--accent); margin-bottom:20px;">X EXCHANGE</h2>
            <div class="lang-option" onclick="setInitialLang('es')">🇪🇸 ESPAÑOL</div>
            <div class="lang-option" onclick="setInitialLang('en')">🇺🇸 ENGLISH</div>
            <div class="lang-option" onclick="setInitialLang('ru')">🇷🇺 PУССКИЙ</div>
        </div>
    </div>

    <div class="header">
        <div class="logo">X EXCHANGE</div>
        <div class="live-stat">● <span id="online-count">1,924</span> ONLINE</div>
    </div>

    <div class="categories">
        <button class="cat-btn active" id="tr-c-exchange" onclick="filterCat('INTERCAMBIO', this)"></button>
        <button class="cat-btn" id="tr-c-bots" onclick="filterCat('BOTS', this)"></button>
        <button class="cat-btn" id="tr-c-ch" onclick="filterCat('CANALES', this)"></button>
        <button class="cat-btn" id="tr-c-gr" onclick="filterCat('GRUPOS', this)"></button>
    </div>

    <div id="main-feed" class="feed"></div>

    <button class="btn-plus" onclick="openPublish()"><i class="fas fa-plus"></i></button>

    <div id="modal-pub" class="modal">
        <div class="modal-box">
            <h2 id="tr-p-h" style="font-family:'Orbitron'; color:var(--accent); margin-bottom:15px; text-align:center;"></h2>
            <div id="form-content"></div>
            <button class="btn-main" id="tr-p-b" onclick="publicar()" style="background:var(--accent);"></button>
            <button onclick="document.getElementById('modal-pub').style.display='none'" id="tr-p-c" style="margin-top:15px; background:none; border:none; color:#666; width:100%;"></button>
        </div>
    </div>

<script>
// USANDO TUS CREDENCIALES DE LA CAPTURA
const firebaseConfig = { 
    apiKey: "AIzaSyC5ObLcwYBLrwVU2ZNqCnBDgarTa88DFJE", 
    authDomain: "fruithunter-b5d2d.firebaseapp.com", 
    databaseURL: "https://fruithunter-b5d2d-default-rtdb.firebaseio.com", 
    projectId: "fruithunter-b5d2d", 
    storageBucket: "fruithunter-b5d2d.appspot.com", 
    messagingSenderId: "910354867578", 
    appId: "1:910354867578:web:30c5a30058c621116622c3" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const langData = {
    es: { exchange: "INTERCAMBIA COSAS", bots: "🤖 BOTS", ch: "📣 CANALES", gr: "👥 GRUPOS", pubH: "PUBLICAR", pubB: "SUBIR AHORA", close: "CERRAR", view: "VER", viewEx: "CAMBIAR", phManual: "Escribe qué ofreces y buscas...", phUser: "@TuUsuario de Telegram", phTitle: "Nombre", phLink: "t.me/enlace", msgEx: "Vengo de @ReferralsXchangeBot por el intercambio de:", exp: "Expira en: ", ok: "¡Publicado!" },
    en: { exchange: "EXCHANGE STUFF", bots: "🤖 BOTS", ch: "📣 CHANNELS", gr: "👥 GROUPS", pubH: "PUBLISH", pubB: "UPLOAD NOW", close: "CLOSE", view: "VIEW", viewEx: "EXCHANGE", phManual: "Write what you offer/want...", phUser: "Your Telegram @User", phTitle: "Name", phLink: "t.me/link", msgEx: "I'm coming from @ReferralsXchangeBot for:", exp: "Expires in: ", ok: "Published!" },
    ru: { exchange: "ОБМЕН ВЕЩАМИ", bots: "🤖 БОТЫ", ch: "📣 КАНАЛЫ", gr: "👥 ГРУППЫ", pubH: "ОПУБЛИКОВАТЬ", pubB: "ЗАГРУЗИТЬ", close: "ЗАКРЫТЬ", view: "СМОТРЕТЬ", viewEx: "ОБМЕНЯТЬ", phManual: "Напишите, что вы предлагаете...", phUser: "Ваш @Username", phTitle: "Название", phLink: "Ссылка", msgEx: "Я из @ReferralsXchangeBot для обмена:", exp: "Истекает через: ", ok: "Опубликовано!" }
};

let currentLang = 'es';
let activeCat = 'INTERCAMBIO';

function setInitialLang(lang) {
    currentLang = lang;
    document.getElementById('lang-overlay').style.display = 'none';
    const t = langData[lang];
    document.getElementById('tr-c-exchange').innerText = t.exchange;
    document.getElementById('tr-c-bots').innerText = t.bots;
    document.getElementById('tr-c-ch').innerText = t.ch;
    document.getElementById('tr-c-gr').innerText = t.gr;
    document.getElementById('tr-p-h').innerText = t.pubH;
    document.getElementById('tr-p-b').innerText = t.pubB;
    document.getElementById('tr-p-c').innerText = t.close;
    loadData();
}

function openPublish() {
    const t = langData[currentLang];
    const content = document.getElementById('form-content');
    content.innerHTML = activeCat === 'INTERCAMBIO' ? 
        `<textarea id="p-desc" placeholder="${t.phManual}"></textarea><input type="text" id="p-user" placeholder="${t.phUser}">` :
        `<input type="text" id="p-title" placeholder="${t.phTitle}"><input type="text" id="p-link" placeholder="${t.phLink}">`;
    document.getElementById('modal-pub').style.display = 'flex';
}

function publicar() {
    const now = new Date().getTime();
    const views = Math.floor(Math.random() * 800) + 200; // Registro en consola
    const data = { category: activeCat, time: now, views: views };
    
    if (activeCat === 'INTERCAMBIO') {
        data.desc = document.getElementById('p-desc').value;
        data.user = document.getElementById('p-user').value;
        if (!data.desc || !data.user) return;
    } else {
        data.title = document.getElementById('p-title').value;
        data.link = document.getElementById('p-link').value;
        if (!data.title || !data.link) return;
    }

    db.ref('posts').push(data).then(() => {
        alert(langData[currentLang].ok);
        document.getElementById('modal-pub').style.display = 'none';
    });
}

function loadData(category = 'INTERCAMBIO') {
    activeCat = category;
    db.ref('posts').on('value', snap => {
        const feed = document.getElementById('main-feed');
        feed.innerHTML = '';
        const now = new Date().getTime();
        
        snap.forEach(child => {
            const p = child.val();
            const timeLeft = 86400000 - (now - p.time); // 24h en ms

            if (timeLeft <= 0) {
                db.ref('posts/' + child.key).remove(); // Borrado cada 24h
                return;
            }

            if(p.category === category) {
                const isEx = p.category === 'INTERCAMBIO';
                const hours = Math.floor(timeLeft / 3600000);
                feed.innerHTML += `
                <div class="card">
                    <div style="font-weight:800; font-size:14px;">${isEx ? p.desc : p.title}</div>
                    <button class="btn-main" style="background:${isEx?'var(--accent)':'#fff'}" onclick="accion('${isEx}', '${p.link||''}', '${p.desc||''}', '${p.user||''}')">
                        ${isEx ? langData[currentLang].viewEx : langData[currentLang].view}
                    </button>
                    <div class="card-meta">
                        <span><i class="fas fa-eye"></i> ${p.views}</span>
                        <span class="timer"><i class="fas fa-hourglass-half"></i> ${langData[currentLang].exp}${hours}h</span>
                    </div>
                </div>`;
            }
        });
    });
}

function accion(isEx, link, desc, user) {
    if (isEx === 'true') {
        const msg = encodeURIComponent(`${langData[currentLang].msgEx} "${desc}"`);
        window.open(`https://t.me/${user.replace('@','')}?text=${msg}`);
    } else {
        window.open(link.startsWith('http') ? link : `https://${link}`);
    }
}

function filterCat(cat, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadData(cat);
}

setInterval(() => {
    document.getElementById('online-count').innerText = (1950 + Math.floor(Math.random()*100)).toLocaleString();
}, 4000);
</script>
</body>
</html>
