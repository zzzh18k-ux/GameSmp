<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xchange Elite | Global Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --card-bg: #111111;
            --accent: #24a1de;
            --accent-glow: rgba(36, 161, 222, 0.2);
            --text-main: #ffffff;
            --text-secondary: #8e8e93;
            --border: rgba(255, 255, 255, 0.08);
            --input-bg: #1c1c1e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-main); overflow-x: hidden; padding: 16px; padding-bottom: 40px; }

        /* Header & Language */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0 25px; }
        .brand { display: flex; align-items: center; gap: 12px; }
        .logo-sq { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), #007aff); border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px var(--accent-glow); }
        .brand-name { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
        
        .lang-selector { background: var(--card-bg); border: 1px solid var(--border); color: #fff; padding: 5px; border-radius: 8px; font-size: 12px; outline: none; }

        /* Form section */
        .form-section { background: var(--card-bg); border-radius: 24px; padding: 24px; border: 1px solid var(--border); margin-bottom: 24px; }
        .section-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: block; }

        /* Grid */
        .social-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
        .social-btn { aspect-ratio: 1/1; background: var(--input-bg); border: 1px solid var(--border); border-radius: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .social-btn svg { width: 22px; height: 22px; fill: var(--text-secondary); }
        .social-btn.active { border-color: var(--accent); background: var(--accent-glow); }
        .social-btn.active svg { fill: var(--accent); }

        input, textarea { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 14px; padding: 16px; color: #fff; font-size: 15px; outline: none; margin-bottom: 15px; }
        input:focus, textarea:focus { border-color: var(--accent); background: #252528; }

        .btn-main { background: var(--accent); color: #fff; border: none; width: 100%; padding: 18px; border-radius: 16px; font-weight: 700; font-size: 16px; cursor: pointer; box-shadow: 0 10px 20px rgba(36, 161, 222, 0.15); }
        .btn-main:active { transform: scale(0.97); }

        /* Feed */
        .post-card { background: var(--card-bg); border-radius: 20px; padding: 18px; border: 1px solid var(--border); margin-bottom: 12px; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .post-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .user-tag { color: var(--accent); font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 6px; }
        .activity-pill { background: rgba(255, 255, 255, 0.05); padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; }
        .post-content { font-size: 15px; color: #efeff4; line-height: 1.5; margin-bottom: 16px; word-wrap: break-word; }
        .post-footer { display: flex; justify-content: space-between; align-items: center; }
        .btn-contact { background: #fff; color: #000; padding: 10px 18px; border-radius: 12px; font-size: 13px; font-weight: 700; text-decoration: none; }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #fff; color: #000; padding: 12px 24px; border-radius: 50px; font-weight: 700; z-index: 1000; transition: 0.5s; }
        #toast.visible { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="toast">OFERTA ENVIADA</div>

    <header class="header">
        <div class="brand">
            <div class="logo-sq">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
            </div>
            <span class="brand-name">Xchange Elite</span>
        </div>
        <select class="lang-selector" onchange="changeLang(this.value)">
            <option value="es">🇪🇸 ES</option>
            <option value="en">🇺🇸 EN</option>
            <option value="pt">🇧🇷 PT</option>
        </select>
    </header>

    <main class="form-section">
        <span class="section-label" id="txt-channel">Canal de Enlace</span>
        <div class="social-grid">
            <div class="social-btn active" onclick="setPlat('tg', this)"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8l-1.13 7.19c-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-3.53 2.39-5.35 3.6-5.46 3.62-.51.35-.98.52-1.4.51-.46-.01-1.35-.26-2.01-.48-.81-.27-1.45-.42-1.39-.89.03-.25.38-.51 1.05-.78 1.37-.58 4.12-1.76 8.24-3.55 3.92-1.66 4.73-1.95 5.27-1.96.12 0 .38.03.55.17.14.12.18.28.19.39 0 .14 0 .28-.01.41z"/></svg></div>
            <div class="social-btn" onclick="setPlat('ig', this)"><svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg></div>
            <div class="social-btn" onclick="setPlat('tk', this)"><svg viewBox="0 0 24 24"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg></div>
            <div class="social-btn" onclick="setPlat('web', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg></div>
            <div class="social-btn" onclick="setPlat('box', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"></path><path d="m3.3 7 8.7 5 8.7-5"></path><path d="M12 22V12"></path></svg></div>
        </div>

        <span class="section-label" id="txt-contact">ID de Contacto</span>
        <input type="text" id="user-id" placeholder="@usuario">

        <span class="section-label" id="txt-activity">Tipo de Actividad</span>
        <input type="text" id="activity-tag" placeholder="Ej: Registro, Follow">

        <span class="section-label" id="txt-msg">Propuesta</span>
        <textarea id="trade-msg" rows="3" placeholder="Detalles de tu oferta..."></textarea>

        <button class="btn-main" onclick="publishTrade()" id="txt-btn">PUBLICAR EN MERCADO</button>
    </main>

    <div id="muro-elite" class="feed-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, query, orderByChild } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

        // --- CONFIGURACIÓN ---
        const firebaseConfig = {
            apiKey: "PEGA_AQUI_TU_API_KEY", // ¡IMPORTANTE!
            databaseURL: "https://fruithunter-b5d2d-default-rtdb.firebaseio.com",
            projectId: "fruithunter-b5d2d",
            appId: "1:910354867578:web:30c5a30058c621116622c3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let selectedPlat = 'tg';

        // Multi-idioma
        const i18n = {
            es: { channel: "Canal de Enlace", contact: "ID de Contacto", activity: "Actividad", msg: "Propuesta", btn: "PUBLICAR EN MERCADO", toast: "OFERTA TRANSMITIDA", contactBtn: "CONTACTAR" },
            en: { channel: "Link Channel", contact: "Contact ID", activity: "Activity Type", msg: "Proposal", btn: "PUBLISH ON MARKET", toast: "OFFER TRANSMITTED", contactBtn: "CONTACT" },
            pt: { channel: "Canal de Link", contact: "ID de Contato", activity: "Atividade", msg: "Proposta", btn: "PUBLICAR NO MERCADO", toast: "OFERTA ENVIADA", contactBtn: "CONTATO" }
        };

        window.changeLang = (lang) => {
            document.getElementById('txt-channel').innerText = i18n[lang].channel;
            document.getElementById('txt-contact').innerText = i18n[lang].contact;
            document.getElementById('txt-activity').innerText = i18n[lang].activity;
            document.getElementById('txt-msg').innerText = i18n[lang].msg;
            document.getElementById('txt-btn').innerText = i18n[lang].btn;
            document.getElementById('toast').innerText = i18n[lang].toast;
        };

        window.setPlat = (p, el) => {
            document.querySelectorAll('.social-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            selectedPlat = p;
        };

        window.publishTrade = () => {
            const userId = document.getElementById('user-id').value.trim();
            const tag = document.getElementById('activity-tag').value.trim();
            const msg = document.getElementById('trade-msg').value.trim();
            if(!userId || !tag || !msg) return;

            push(ref(db, 'elite_trades_v2'), {
                u: userId, tag: tag, msg: msg, plat: selectedPlat, t: Date.now()
            }).then(() => {
                document.getElementById('trade-msg').value = "";
                const toast = document.getElementById('toast');
                toast.classList.add('visible');
                setTimeout(() => toast.classList.remove('visible'), 2500);
            });
        };

        const tradesRef = query(ref(db, 'elite_trades_v2'), orderByChild('t'));
        onValue(tradesRef, (snap) => {
            const feed = document.getElementById('muro-elite');
            feed.innerHTML = "";
            let list = [];
            snap.forEach(c => list.push(c.val()));
            
            list.reverse().forEach(v => {
                const lang = document.querySelector('.lang-selector').value;
                const contactUrl = v.plat === 'tg' ? `https://t.me/${v.u.replace('@','')}` : 
                                 v.plat === 'ig' ? `https://instagram.com/${v.u.replace('@','')}` : 
                                 v.plat === 'tk' ? `https://tiktok.com/@${v.u.replace('@','')}` : v.u;

                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-header">
                        <span class="user-tag">${v.u}</span>
                        <span class="activity-pill">${v.tag}</span>
                    </div>
                    <div class="post-content">${v.msg.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:var(--accent); font-weight:600">LINK 🔗</a>')}</div>
                    <div class="post-footer">
                        <span style="font-size:10px; color:#555">${v.plat.toUpperCase()}</span>
                        <a href="${contactUrl}" class="btn-contact" target="_blank">${i18n[lang].contactBtn}</a>
                    </div>`;
                feed.appendChild(card);
            });
        });
    </script>
</body>
</html>
