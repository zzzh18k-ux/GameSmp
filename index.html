<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xgrab USDT - Sistema Profesional</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;800&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #f8f5f0; --panel: #ffffff; --accent: #c99b67; --gold: #b0895d; }
        body { background: var(--bg); font-family: 'Montserrat', sans-serif; margin: 0; padding: 20px; text-align: center; }
        .vault-card { background: var(--panel); border-radius: 30px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid rgba(201,155,103,0.1); }
        .amount { font-family: 'Playfair Display', serif; font-size: 42px; color: var(--gold); margin: 10px 0; }
        .btn-main { background: linear-gradient(135deg, var(--accent), var(--gold)); color: white; border: none; padding: 20px; width: 100%; border-radius: 20px; font-weight: 800; font-size: 16px; cursor: pointer; box-shadow: 0 10px 20px rgba(176,137, 93, 0.3); }
        .status { font-size: 10px; font-weight: 800; color: #aaa; text-transform: uppercase; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="status">ID: <span id="display-id">---</span> | <span style="color:#27ae60;">● Sincronizado</span></div>

<div class="vault-card">
    <p style="font-size:10px; color:#aaa; margin:0;">BÓVEDA DISPONIBLE</p>
    <div class="amount">$<span id="ui-balance">0.000000</span></div>
    <p style="font-size:11px; font-weight:700;">REGISTROS: <span id="ads-count">0</span> / 15</p>
</div>

<button class="btn-main" onclick="verAnuncio()">EJECUTAR PROTOCOLO (ADS)</button>

<script>
// CONFIGURACIÓN FIREBASE
const firebaseConfig = { apiKey: "AIzaSyC5ObLcwYBLrwVU2ZNqCnBDgarTa88DFJE", authDomain: "fruithunter-b5d2d.firebaseapp.com", databaseURL: "https://fruithunter-b5d2d-default-rtdb.firebaseio.com", projectId: "fruithunter-b5d2d", storageBucket: "fruithunter-b5d2d.appspot.com", messagingSenderId: "910354867578", appId: "1:910354867578:web:30c5a30058c621116622c3" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const tg = window.Telegram.WebApp;
tg.ready();

let userUID = localStorage.getItem('xgrab_uid') || "USR" + Math.floor(Math.random()*89999 + 10000);
localStorage.setItem('xgrab_uid', userUID);
document.getElementById('display-id').innerText = userUID;

// --- REGISTRO Y AVISO AL CANAL ---
db.ref('users/' + userUID).once('value', snap => {
    if(!snap.exists()) {
        setTimeout(() => {
            const params = new URLSearchParams(window.location.search);
            const refID = tg.initDataUnsafe.start_param || params.get('tgWebAppStartParam') || null;

            db.ref('users/' + userUID).set({
                balance: 0.0001,
                invitedBy: refID,
                adsToday: 0,
                created: new Date().getTime()
            }).then(() => {
                // ESTE ES EL AVISO QUE LLEGA A TELEGRAM
                const msg = `👤 *NUEVA TERMINAL*\n🆔 ID: \`${userUID}\` \n🔗 REF: ${refID ? '`'+refID+'`' : '⚠️ DIRECTO'}`;
                fetch(`https://api.telegram.org/bot7981775992:AAGmBMWU2jQEL_hstigComicKPUSAqM1qPg/sendMessage?chat_id=@ALSKSNNSLSMS&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
            });
        }, 2500); // Pausa de seguridad
    } else {
        const d = snap.val();
        document.getElementById('ui-balance').innerText = (d.balance || 0).toFixed(6);
        document.getElementById('ads-count').innerText = d.adsToday || 0;
    }
});

// --- MOTOR DE ANUNCIOS Y COMISIÓN ---
function verAnuncio() {
    // Inicializar Adsgram (ID de bloque que usted me dio)
    const AdController = window.Adsgram.init({ blockId: "18897" });

    AdController.show().then(() => {
        const pago = 0.0008;
        const comision = pago * 0.10;

        // 1. Pagar al usuario
        db.ref('users/' + userUID).transaction(u => {
            if(u) {
                u.balance = (u.balance || 0) + pago;
                u.adsToday = (u.adsToday || 0) + 1;
            }
            return u;
        }).then(() => {
            // 2. Pagar comisión al jefe en vivo
            db.ref('users/' + userUID + '/invitedBy').once('value', s => {
                const jefe = s.val();
                if(jefe) {
                    db.ref('users/' + jefe + '/balance').transaction(b => (b || 0) + comision);
                }
            });
            alert("Protocolo validado. Saldo actualizado.");
            location.reload(); 
        });
    }).catch(e => {
        alert("Anuncio no disponible en su región ahora mismo.");
    });
}
</script>
</body>
</html>
