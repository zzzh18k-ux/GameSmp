<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X Exchange PRO</title>
    
    <script src='//libtl.com/sdk.js' data-zone='10747271' data-sdk='show_10747271'></script>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --fb-blue: #1877F2; 
            --tg-blue: #24A1DE; 
            --bg-soft: #F0F2F5; 
            --card-bg: #FFFFFF; 
            --text-main: #1C1E21;
            --text-sub: #65676B;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        body { background: var(--bg-soft); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        #lang-overlay { position: fixed; inset: 0; background: rgba(240, 242, 245, 0.9); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .lang-card { background: #fff; border: none; padding: 30px; border-radius: 25px; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .lang-option { background: var(--bg-soft); color: var(--text-main); border: 1px solid #ddd; padding: 15px; border-radius: 15px; margin: 10px 0; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .lang-option:hover { background: var(--fb-blue); color: #fff; }

        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); border-bottom: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logo { font-family: 'Orbitron'; color: var(--fb-blue); font-size: 18px; letter-spacing: 1px; }
        .live-stat { color: #31a24c; font-size: 11px; font-weight: 800; background: #e7f3ff; padding: 4px 10px; border-radius: 20px; }

        .categories { display: flex; gap: 10px; overflow-x: auto; padding: 15px; background: var(--card-bg); scrollbar-width: none; }
        .cat-btn { background: #e4e6eb; border: none; color: var(--text-sub); padding: 10px 18px; border-radius: 20px; font-size: 12px; white-space: nowrap; font-weight: 600; transition: 0.3s; }
        .cat-btn.active { background: var(--fb-blue); color: #fff; box-shadow: 0 4px 12px rgba(24, 119, 242, 0.3); }

        .feed { flex: 1; overflow-y: scroll; padding: 15px; padding-bottom: 100px; }
        
        .card { background: var(--card-bg); border-radius: 15px; padding: 18px; margin-bottom: 15px; border: 1px solid #ddd; box-shadow: 0 1px 2px rgba(0,0,0,0.1); animation: fadeIn 0.4s ease; }
        .card-title { font-weight: 600; font-size: 14px; color: var(--text-main); line-height: 1.5; margin-bottom: 12px; }
        
        .card-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-sub); margin-top: 12px; border-top: 1px solid #f0f2f5; padding-top: 10px; }
        
        .btn-main { background: var(--tg-blue); color: #fff; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: 700; font-size: 13px; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-main:active { transform: scale(0.98); }

        .btn-plus { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--fb-blue); color: #fff; width: 60px; height: 60px; border-radius: 50%; font-size: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(24, 119, 242, 0.4); z-index: 1000; }

        .modal { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 5000; display: none; flex-direction: column; padding: 30px; justify-content: center; backdrop-filter: blur(5px); }
        .modal-box { background: #fff; border: 1px solid #ddd; padding: 25px; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        
        input, textarea { background: #f0f2f5; border: 1px solid #ddd; color: #1c1e21; padding: 15px; border-radius: 12px; margin-bottom: 15px; width: 100%; font-size: 14px; outline: none; }
        textarea { height: 100px; resize: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="lang-overlay">
        <div class="lang-card">
            <h2 style="font-family:'Orbitron'; color:var(--fb-blue); margin-bottom:20px;">X EXCHANGE</h2>
            <div class="lang-option" onclick="setInitialLang('es')">🇪🇸 ESPAÑOL</div>
            <div class="lang-option" onclick="setInitialLang('en')">🇺🇸 ENGLISH</div>
            <div class="lang-option" onclick="setInitialLang('ru')">🇷🇺 PУССКИЙ</div>
        </div>
    </div>

    <div class="header">
        <div class="logo">X EXCHANGE</div>
        <div class="live-stat">● <span id="online-count">1,940</span> ONLINE</div>
    </div>

    <div class="categories">
        <button class="cat-btn active" id="tr-c-exchange" onclick="filterCat('INTERCAMBIO', this)"></button>
        <button class="cat-btn" id="tr-c-bots" onclick="filterCat('BOTS', this)"></button>
        <button class="cat-btn" id="tr-c-ch" onclick="filterCat('CANALES', this)"></button>
        <button class="cat-btn" id="tr-c-gr" onclick="filterCat('GRUPOS', this)"></button>
    </div>

    <div id="main-feed" class="feed"></div>

    <button class="btn-plus" onclick="openPublish()"><i class="fas fa-plus"></i></button>

    <div id="modal-pub" class="modal">
        <div class="modal-box">
            <h2 id="tr-p-h" style="font-family:'Orbitron'; color:var(--fb-blue); margin-bottom:15px; text-align:center;"></h2>
            <div id="form-content"></div>
            <button class="btn-main" id="tr-p-b" onclick="publicar()" style="background:var(--fb-blue);"></button>
            <button onclick="document.getElementById('modal-pub').style.display='none'" id="tr-p-c" style="margin-top:15px; background:none; border:none; color:#65676B; width:100%; font-weight:bold; cursor:pointer;"></button>
        </div>
    </div>

<script>
const firebaseConfig = { apiKey: "AIzaSyC5ObLcwYBLrwVU2ZNqCnBDgarTa88DFJE", authDomain: "fruithunter-b5d2d.firebaseapp.com", databaseURL: "https://fruithunter-b5d2d-default-rtdb.firebaseio.com", projectId: "fruithunter-b5d2d", storageBucket: "fruithunter-b5d2d.appspot.com", messagingSenderId: "910354867578", appId: "1:910354867578:web:30c5a30058c621116622c3" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const langData = {
    es: { exchange: "Intercambios", bots: "🤖 Bots", ch: "📣 Canales", gr: "👥 Grupos", pubH: "PUBLICAR", pubB: "SUBIR AHORA", close: "CERRAR", view: "VER", viewEx: "CAMBIAR", phManual: "Escribe qué ofreces y buscas...", phUser: "@TuUsuario de Telegram", phTitle: "Nombre", phLink: "t.me/enlace", msgEx: "Vengo de @ReferralsXchangeBot por el intercambio de:", exp: "Expira en: ", ok: "¡Publicado!", spam: "¡Ya publicaste este contenido!" },
    en: { exchange: "Exchanges", bots: "🤖 Bots", ch: "📣 Channels", gr: "👥 Groups", pubH: "PUBLISH", pubB: "UPLOAD NOW", close: "CLOSE", view: "VIEW", viewEx: "EXCHANGE", phManual: "Write what you offer/want...", phUser: "Your Telegram @User", phTitle: "Name", phLink: "t.me/link", msgEx: "I'm coming from @ReferralsXchangeBot for:", exp: "Expires in: ", ok: "Published!", spam: "Content already posted!" },
    ru: { exchange: "Обмены", bots: "🤖 Боты", ch: "Каналы", gr: "Группы", pubH: "ОПУБЛИКОВАТЬ", pubB: "ЗАГРУЗИТЬ", close: "ЗАКРЫТЬ", view: "СМОТРЕТЬ", viewEx: "ОБМЕНЯТЬ", phManual: "Напишите, что вы предлагаете...", phUser: "Ваш @Username", phTitle: "Название", phLink: "Ссылка", msgEx: "Я из @ReferralsXchangeBot для обмена:", exp: "Истекает через: ", ok: "Опубликовано!", spam: "Уже опубликовано!" }
};

let currentLang = 'es';
let activeCat = 'INTERCAMBIO';
let isProcessing = false;

function setInitialLang(lang) {
    currentLang = lang;
    document.getElementById('lang-overlay').style.display = 'none';
    const t = langData[lang];
    document.getElementById('tr-c-exchange').innerText = t.exchange;
    document.getElementById('tr-c-bots').innerText = t.bots;
    document.getElementById('tr-c-ch').innerText = t.ch;
    document.getElementById('tr-c-gr').innerText = t.gr;
    document.getElementById('tr-p-h').innerText = t.pubH;
    document.getElementById('tr-p-b').innerText = t.pubB;
    document.getElementById('tr-p-c').innerText = t.close;
    loadData();
}

function openPublish() {
    const t = langData[currentLang];
    const content = document.getElementById('form-content');
    content.innerHTML = activeCat === 'INTERCAMBIO' ? 
        `<textarea id="p-desc" placeholder="${t.phManual}"></textarea><input type="text" id="p-user" placeholder="${t.phUser}">` :
        `<input type="text" id="p-title" placeholder="${t.phTitle}"><input type="text" id="p-link" placeholder="${t.phLink}">`;
    document.getElementById('modal-pub').style.display = 'flex';
}

function publicar() {
    if (isProcessing) return;
    isProcessing = true;
    const btn = document.getElementById('tr-p-b');
    btn.disabled = true;
    btn.innerText = "...";

    // Salvavidas: Si el anuncio traba el código, forzamos la subida a los 3 seg
    const rescueTimer = setTimeout(() => {
        if (isProcessing) procesarPublicacion();
    }, 3000);

    if (typeof show_10747271 === 'function') {
        show_10747271().finally(() => {
            clearTimeout(rescueTimer);
            procesarPublicacion();
        });
    } else {
        clearTimeout(rescueTimer);
        procesarPublicacion();
    }
}

function procesarPublicacion() {
    const now = new Date().getTime();
    let contentCheck = "";
    const data = { category: activeCat, time: now, views: Math.floor(Math.random()*5)+1 };
    
    if (activeCat === 'INTERCAMBIO') {
        const descEl = document.getElementById('p-desc');
        const userEl = document.getElementById('p-user');
        if(!descEl || !userEl) return resetPub();
        data.desc = descEl.value.trim();
        data.user = userEl.value.trim();
        if (!data.desc || !data.user) return resetPub();
        contentCheck = data.desc.toLowerCase();
    } else {
        const titleEl = document.getElementById('p-title');
        const linkEl = document.getElementById('p-link');
        if(!titleEl || !linkEl) return resetPub();
        data.title = titleEl.value.trim();
        data.link = linkEl.value.trim();
        if (!data.title || !data.link) return resetPub();
        contentCheck = data.link.toLowerCase();
    }

    db.ref('posts').once('value', snap => {
        let repeated = false;
        snap.forEach(c => {
            const p = c.val();
            if ((p.desc || p.link || "").toLowerCase() === contentCheck) repeated = true;
        });

        if (repeated) {
            alert(langData[currentLang].spam);
            resetPub();
        } else {
            db.ref('posts').push(data).then(() => {
                alert(langData[currentLang].ok);
                document.getElementById('modal-pub').style.display = 'none';
                resetPub();
            });
        }
    });
}

function resetPub() {
    isProcessing = false;
    const btn = document.getElementById('tr-p-b');
    if(btn) {
        btn.disabled = false;
        btn.innerText = langData[currentLang].pubB;
    }
}

function loadData(category = 'INTERCAMBIO') {
    activeCat = category;
    db.ref('posts').on('value', snap => {
        const feed = document.getElementById('main-feed');
        const now = new Date().getTime();
        let htmlBuffer = "";
        
        snap.forEach(child => {
            const p = child.val();
            const timeLeft = 86400000 - (now - p.time);
            if (timeLeft <= 0) { db.ref('posts/' + child.key).remove(); return; }

            if(p.category === category) {
                const isEx = p.category === 'INTERCAMBIO';
                const hours = Math.floor(timeLeft / 3600000);
                htmlBuffer += `
                <div class="card">
                    <div class="card-title">${isEx ? p.desc : p.title}</div>
                    <button class="btn-main" onclick="accion('${isEx}', '${p.link||''}', '${p.desc||''}', '${p.user||''}')">
                        ${isEx ? langData[currentLang].viewEx : langData[currentLang].view}
                    </button>
                    <div class="card-meta">
                        <span><i class="fas fa-eye"></i> ${p.views || 0} vistas</span>
                        <span style="color:#d93025; font-weight:700;"><i class="fas fa-clock"></i> ${hours}h</span>
                    </div>
                </div>`;
            }
        });
        feed.innerHTML = htmlBuffer;
    });
}

function accion(isEx, link, desc, user) {
    const chance = Math.floor(Math.random() * 10) + 1;
    if (chance <= 3 && typeof show_10747271 === 'function') {
        show_10747271().finally(() => { ejecutarSalida(isEx, link, desc, user); });
    } else {
        ejecutarSalida(isEx, link, desc, user);
    }
}

function ejecutarSalida(isEx, link, desc, user) {
    if (isEx === 'true') {
        const msg = encodeURIComponent(`${langData[currentLang].msgEx} "${desc}"`);
        window.open(`https://t.me/${user.replace('@','')}?text=${msg}`);
    } else {
        window.open(link.startsWith('http') ? link : `https://${link}`);
    }
}

function filterCat(cat, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadData(cat);
}

setInterval(() => {
    document.getElementById('online-count').innerText = (1940 + Math.floor(Math.random()*60)).toLocaleString();
}, 4000);
</script>
</body>
</html>
