<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xchange Elite | Global Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card-bg: #0a0a0a;
            --accent: #24a1de;
            --accent-glow: rgba(36, 161, 222, 0.3);
            --text-main: #ffffff;
            --text-sec: #8e8e93;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-main); padding: 15px; padding-bottom: 100px; }

        /* Radar de Actividad */
        .radar { background: linear-gradient(90deg, #111, #000); border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: flex; justify-content: space-around; margin-bottom: 20px; box-shadow: 0 0 20px var(--accent-glow); }
        .stat { text-align: center; }
        .stat-val { display: block; font-weight: 800; color: var(--accent); font-size: 18px; }
        .stat-lbl { font-size: 9px; text-transform: uppercase; color: var(--text-sec); letter-spacing: 1px; }

        /* Tutorial */
        .tuto-btn { background: #1a1a1a; color: #fff; border: 1px solid var(--accent); padding: 8px 15px; border-radius: 50px; font-size: 11px; font-weight: 700; margin-bottom: 15px; display: inline-block; cursor: pointer; }

        /* Formulario Elite */
        .form-card { background: var(--card-bg); border-radius: 20px; padding: 20px; border: 1px solid var(--border); margin-bottom: 25px; }
        input, textarea { width: 100%; background: #111; border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: #fff; margin-bottom: 12px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
        .btn-pub { width: 100%; background: var(--accent); color: #fff; border: none; padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer; }

        /* Muro y Verificados */
        .post { background: #0a0a0a; border: 1px solid var(--border); border-radius: 18px; padding: 16px; margin-bottom: 12px; }
        .v-check { color: #ffd700; font-size: 14px; margin-left: 5px; } /* Check Dorado */
        .tag-pill { background: rgba(36,161,222,0.1); color: var(--accent); padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; float: right; }
        .post-msg { font-size: 14px; margin: 12px 0; line-height: 1.4; color: #ddd; }
        .btn-con { background: #fff; color: #000; padding: 8px 14px; border-radius: 10px; font-size: 12px; font-weight: 700; text-decoration: none; display: inline-block; }

        /* Bottom Nav */
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-link { color: var(--text-sec); text-decoration: none; font-size: 10px; font-weight: 700; text-align: center; }
        .nav-link.active { color: var(--accent); }

        /* Burbujas flotantes */
        .social-bubbles { position: fixed; bottom: 85px; right: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 999; }
        .bubble { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 2px solid var(--accent); background: #000; }
    </style>
</head>
<body>

    <div class="radar">
        <div class="stat"><span class="stat-val">1.4k</span><span class="stat-lbl">Usuarios</span></div>
        <div class="stat"><span class="stat-val" id="count-trades">342</span><span class="stat-lbl">Tratos Hoy</span></div>
        <div class="stat"><span class="stat-val" style="color:#4cd964">● Online</span><span class="stat-lbl">Estado</span></div>
    </div>

    <div class="tuto-btn" onclick="alert('PASOS PARA INTERCAMBIAR:\n1. Elige tu red social.\n2. Pon tu @ID para que te contacten.\n3. Describe qué ofreces.\n4. ¡Cierra el trato en el Grupo Oficial!')">📖 ¿CÓMO USAR?</div>

    <div class="form-card">
        <input type="text" id="user-id" placeholder="@tu_usuario">
        <input type="text" id="user-tag" placeholder="¿Qué buscas? (Ej: Netflix, Seguidores)">
        <textarea id="user-msg" rows="3" placeholder="Escribe tu propuesta aquí..."></textarea>
        <button class="btn-pub" onclick="publish()">PUBLICAR AHORA</button>
    </div>

    <div id="feed"></div>

    <div class="social-bubbles">
        <a href="https://t.me/XchangeEliteOficial" class="bubble" target="_blank">📢</a>
        <a href="https://t.me/ReferidosXchange" class="bubble" target="_blank">👥</a>
    </div>

    <nav class="nav">
        <a href="#" class="nav-link active">INICIO</a>
        <a href="https://t.me/ReferidosXchange" class="nav-link" target="_blank">GRUPO</a>
        <a href="https://t.me/XchangeEliteOficial" class="nav-link" target="_blank">CANAL</a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, query, orderByChild } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

        // CONFIGURA TUS DATOS AQUÍ
        const firebaseConfig = {
            apiKey: "TU_API_KEY_AQUÍ",
            databaseURL: "https://fruithunter-b5d2d-default-rtdb.firebaseio.com",
            projectId: "fruithunter-b5d2d",
            appId: "1:910354867578:web:30c5a30058c621116622c3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Lista de usuarios verificados (Agrega aquí los @ de tus amigos)
        const verificados = ["@Admin", "@Soporte", "@TuUsuario"]; 

        window.publish = () => {
            const u = document.getElementById('user-id').value;
            const t = document.getElementById('user-tag').value;
            const m = document.getElementById('user-msg').value;
            if(!u || !t || !m) return;

            push(ref(db, 'trades_elite_v3'), { u, t, m, time: Date.now() }).then(() => {
                document.getElementById('user-msg').value = "";
                alert("¡Oferta enviada al mercado!");
            });
        };

        onValue(query(ref(db, 'trades_elite_v3'), orderByChild('time')), (snap) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            let data = [];
            snap.forEach(c => data.push(c.val()));
            data.reverse().forEach(v => {
                const isV = verificados.includes(v.u) ? '<span class="v-check">✔</span>' : '';
                feed.innerHTML += `
                <div class="post">
                    <span class="tag-pill">${v.t}</span>
                    <strong style="font-size:14px; color:var(--accent)">${v.u}${isV}</strong>
                    <div class="post-msg">${v.m}</div>
                    <a href="https://t.me/${v.u.replace('@','')}" class="btn-con" target="_blank">CONTACTAR</a>
                </div>`;
            });
        });
    </script>
</body>
</html>
