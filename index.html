<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xgrab USDT - Control Panel</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='10278425' data-sdk='show_10278425'></script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --neon: #00d4ff; --dark: #080a0c; --panel: #12161b; }
        body { margin: 0; padding: 0; background: var(--dark); color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; user-select: none; }
        #main-ui { padding: 25px; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; }
        .vault-card { background: linear-gradient(145deg, #12161b, #0a0c10); border-radius: 30px; padding: 40px 20px; text-align: center; border: 1px solid rgba(0, 212, 255, 0.1); margin-bottom: 25px; }
        .vault-amount { font-size: 48px; font-family: 'Orbitron'; font-weight: 900; color: var(--neon); }
        .btn-action { background: var(--neon); color: #000; width: 100%; padding: 22px; border-radius: 20px; border: none; font-family: 'Orbitron'; font-weight: 900; font-size: 16px; cursor: pointer; box-shadow: 0 0 20px rgba(0,212,255,0.2); }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: auto; }
        .menu-item { background: var(--panel); border: 1px solid #1e252e; border-radius: 20px; padding: 20px; text-align: center; cursor: pointer; }
        .menu-item i { color: var(--neon); font-size: 20px; margin-bottom: 8px; display: block; }
        #game-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--panel); border: 1px solid var(--neon); border-radius: 25px; padding: 30px; width: 100%; text-align: center; }
        input { width: 100%; padding: 15px; margin: 15px 0; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; text-align: center; }
    </style>
</head>
<body>

    <div id="main-ui">
        <div style="display:flex; justify-content:space-between; font-size:10px; color:#444; font-weight:900; margin-bottom:15px;">
            <span>XGRAB SYSTEM V4</span>
            <span>USER: <span id="display-id">---</span></span>
        </div>
        <div class="vault-card">
            <div style="font-family:'Orbitron'; font-size:10px; color:var(--neon); letter-spacing:3px;">BALANCE ACTUAL</div>
            <div class="vault-amount">$<span id="ui-balance">0.0000</span></div>
            <div style="font-size:11px; color:#444; margin-top:10px;">Minado hoy: <span id="ads-count">0</span>/15</div>
        </div>
        <button class="btn-action" onclick="startCycle()"><i class="fas fa-crosshairs"></i> COMENZAR CAZA</button>
        <div class="menu-grid">
            <div class="menu-item" onclick="openModal('withdraw')"><i class="fas fa-wallet"></i><span>RETIRAR</span></div>
            <div class="menu-item" onclick="openModal('ref')"><i class="fas fa-users"></i><span>INVITAR</span></div>
            <div class="menu-item" onclick="openModal('hist')"><i class="fas fa-history"></i><span>HISTORIAL</span></div>
            <div class="menu-item" style="opacity: 0.3;"><i class="fas fa-lock"></i><span>PRIVADO</span></div>
        </div>
    </div>

    <div id="sys-modal" class="modal"><div class="modal-content" id="modal-inner"></div></div>
    <div id="game-layer"><canvas id="canvas"></canvas></div>

    <script>
        // CONFIGURACIÓN
        const firebaseConfig = {
            apiKey: "AIzaSyC5ObLcwYBLrwVU2ZNqCnBDgarTa88DFJE",
            authDomain: "fruithunter-b5d2d.firebaseapp.com",
            databaseURL: "https://fruithunter-b5d2d-default-rtdb.firebaseio.com",
            projectId: "fruithunter-b5d2d",
            storageBucket: "fruithunter-b5d2d.appspot.com",
            messagingSenderId: "910354867578",
            appId: "1:910354867578:web:30c5a30058c621116622c3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const TG_BOT_NAME = "XgrabUSDTbot";
        const CHISMOSO_TOKEN = "7981775992:AAGmBMWU2jQEL_hstigComicKPUSAqM1qPg";
        const CHISMOSO_CANAL = "@ALSKSNNSLSMS";

        let userUID = localStorage.getItem('xgrab_uid');
        let isNewUser = false;

        if(!userUID) {
            userUID = "USR" + Math.floor(Math.random()*89999 + 10000);
            localStorage.setItem('xgrab_uid', userUID);
            isNewUser = true;
        }
        document.getElementById('display-id').innerText = userUID;

        // Lógica de Referidos y "Chisme de entrada"
        const params = new URLSearchParams(window.location.search);
        const inviter = params.get('start');
        
        db.ref('users/' + userUID).once('value', snap => {
            if(!snap.exists()) {
                const data = { balance: 0, adsToday: 0 };
                if(inviter && inviter !== userUID) data.invitedBy = inviter;
                db.ref('users/' + userUID).set(data);
                
                // AVISO AL JEFE: Nuevo usuario entró
                const entryMsg = `🆕 *NUEVO USUARIO*\nID: \`${userUID}\`\nInvitado por: \`${inviter || 'Nadie'}\``;
                sendToChismoso(entryMsg);
            }
        });

        let balance = 0, adsToday = 0;
        db.ref('users/' + userUID).on('value', snap => {
            const d = snap.val() || { balance: 0, adsToday: 0 };
            balance = d.balance; adsToday = d.adsToday;
            document.getElementById('ui-balance').innerText = balance.toFixed(4);
            document.getElementById('ads-count').innerText = adsToday;
        });

        function startCycle() {
            if(adsToday >= 15) return alert("Límite diario alcanzado.");
            const ad = window.Adsgram.init({ blockId: "18897" });
            ad.show().then(() => {
                adsToday++;
                db.ref('users/' + userUID).update({ adsToday: adsToday });
                initGame();
            }).catch(() => alert("Completa el anuncio para jugar."));
        }

        function initGame() {
            document.getElementById('game-layer').style.display = 'block';
            // Aquí iría el código visual del juego (omitido por brevedad para centrar en el chisme)
            
            // SIMULACIÓN DE FIN DE JUEGO (Esto ocurre al terminar los 40 seg)
            setTimeout(() => {
                const gain = 0.0050;
                db.ref('users/' + userUID + '/balance').transaction(b => (b || 0) + gain);
                
                // AVISO AL JEFE: Alguien jugó
                const playMsg = `🕹 *ACTIVIDAD*\nID: \`${userUID}\`\nGanó: $${gain}\nSaldo Total: $${(balance + gain).toFixed(4)}`;
                sendToChismoso(playMsg);

                // Comisión automática al jefe
                db.ref('users/' + userUID + '/invitedBy').once('value', s => {
                    const boss = s.val();
                    if(boss) db.ref('users/' + boss + '/balance').transaction(b => (b || 0) + (gain * 0.1));
                });
                document.getElementById('game-layer').style.display = 'none';
            }, 3000); 
        }

        function sendToChismoso(msg) {
            fetch(`https://api.telegram.org/bot${CHISMOSO_TOKEN}/sendMessage?chat_id=${CHISMOSO_CANAL}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
        }

        function openModal(type) {
            const inner = document.getElementById('modal-inner');
            if(type === 'ref') {
                const link = `https://t.me/${TG_BOT_NAME}?start=${userUID}`;
                inner.innerHTML = `<h3>SISTEMA DE REFERIDOS</h3><p>Gana el 10% de cada extracción de tus invitados.</p>
                <input type="text" value="${link}" id="refLink" readonly>
                <button class="btn-action" onclick="copyRef()">COPIAR MI ENLACE</button>
                <p onclick="closeModal()" style="margin-top:20px; color:#444; cursor:pointer">VOLVER</p>`;
            } else if(type === 'withdraw') {
                inner.innerHTML = `<h3>RETIRO DE FONDOS</h3><p>Mínimo $5.00 | Red Polygon</p>
                <input type="text" id="wallet" placeholder="Dirección 0x...">
                <button class="btn-action" onclick="requestPay()">SOLICITAR PAGO</button>
                <p onclick="closeModal()" style="margin-top:20px; color:#444; cursor:pointer">VOLVER</p>`;
            } else {
                inner.innerHTML = `<h3>HISTORIAL</h3><p>No tienes retiros pendientes.</p><button class="btn-action" onclick="closeModal()">CERRAR</button>`;
            }
            document.getElementById('sys-modal').style.display = 'flex';
        }

        function requestPay() {
            const w = document.getElementById('wallet').value;
            if(balance < 5) return alert("Saldo insuficiente.");
            const msg = `💰 *SOLICITUD DE PAGO* 💰\nID: \`${userUID}\`\nMonto: $${balance.toFixed(4)}\nWallet: \`${w}\``;
            sendToChismoso(msg);
            alert("Solicitud enviada a revisión.");
            closeModal();
        }

        function copyRef() {
            document.getElementById('refLink').select();
            document.execCommand('copy');
            alert("Enlace copiado.");
        }

        function closeModal() { document.getElementById('sys-modal').style.display = 'none'; }
    </script>
</body>
</html>
