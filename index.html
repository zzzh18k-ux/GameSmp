        .dot { height: 9px; width: 9px; background-color: var(--accent); border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(49, 162, 76, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(49, 162, 76, 0); } 100% { box-shadow: 0 0 0 0px rgba(49, 162, 76, 0); } }

        .cat-btn.active { background: #fff; color: var(--fb-blue); border: 2px solid var(--fb-blue); padding: 8px 16px; }
        .badge { background: #ff4757; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 8px; margin-left: 4px; font-weight: 800; display: none; }
        .badge.show { display: inline-block; }

        .feed { flex: 1; overflow-y: auto; padding: 20px 15px 120px; }

        .card-title { font-weight: 700; font-size: 15px; margin-bottom: 18px; color: #111; line-height: 1.5; word-wrap: break-word; }

        .btn-main { background: linear-gradient(135deg, #111, #333); color: #fff; border: none; padding: 16px; width: 100%; border-radius: 18px; font-weight: 800; font-size: 13px; letter-spacing: 0.5px; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-main:active { transform: scale(0.96); }

        /* META DATA */
        .card-meta { display: flex; justify-content: space-between; margin-top: 15px; font-size: 11px; color: var(--text-sub); font-weight: 700; border-top: 1px solid #f8f9fa; padding-top: 12px; }

        /* PLUS BUTTON */
        .btn-plus { position: fixed; bottom: 30px; right: 25px; background: #000; color: #fff; width: 70px; height: 70px; border-radius: 50%; font-size: 24px; display: flex; align-items: center; justify-content: center; z-index: 100; border: 6px solid #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        .g-step h4 { font-size: 14px; font-weight: 800; margin-bottom: 5px; color: #000; display: flex; align-items: center; gap: 8px; }
        .g-step p { font-size: 12px; color: #666; line-height: 1.5; }

        #toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); background: #111; color: #fff; padding: 14px 28px; border-radius: 50px; font-size: 12px; font-weight: 700; display: none; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 85%; text-align: center; }

<body>

                <button class="cat-btn" id="btn-BO" onclick="filterCat('BOTS', this)"><i class="fas fa-robot"></i> <span id="tr-cat-bo">Bots</span> <span id="n-BO" class="badge"></span></button>
                <button class="cat-btn" id="btn-CA" onclick="filterCat('CANALES', this)"><i class="fas fa-bullhorn"></i> <span id="tr-cat-ca">Canales</span> <span id="n-CA" class="badge"></span></button>

            </div>

<script>
const firebaseConfig = { apiKey: "AIzaSyC5ObLcwYBLrwVU2ZNqCnBDgarTa88DFJE", authDomain: "fruithunter-b5d2d.firebaseapp.com", databaseURL: "https://fruithunter-b5d2d-default-rtdb.firebaseio.com", projectId: "fruithunter-b5d2d", storageBucket: "fruithunter-b5d2d.appspot.com", messagingSenderId: "910354867578", appId: "1:910354867578:web:30c5a30058c621116622c3" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentLang = 'es'; 
let activeCat = 'INTERCAMBIO';
let pressTimer;
let adsShown = 0;

const langData = {
    es: {
        guideBtn: "MANUAL PRO", online: "COMUNIDAD EN VIVO", 
        pubH: "CREAR PUBLICACIÓN", pubB: "CONFIRMAR Y SUBIR", cancel: "CANCELAR",
        view: "VER PROYECTO", viewEx: "NEGOCIAR POR TELEGRAM", 
        empty: "📭 No hay anuncios aquí todavía. ¡Sé el primero!",
        ok: "🚀 ¡Tu anuncio ya está en órbita!",
        errNoLink: "❌ En Intercambios solo texto y @usuario. Sin links.",
        errDup: "⚠️ Este enlace ya fue publicado hoy.",
        gTitle: "📋 MANUAL DE ÉXITO", gBtn: "LO TENGO",
        gM1: "🤝 Intercambios Limpios", gD1: "Escribe tu oferta (ej: Vendo 100 USDT) y tu @usuario. Los links aquí están prohibidos.",
        gM2: "🚀 Bots y Canales", gD2: "Aquí sí puedes poner tu link. Asegúrate de que funcione correctamente.",
        gM3: "⏰ Ciclo de 24 Horas", gD3: "Todo se borra cada 24h para mantener la red fresca. ¡Vuelve mañana!"
    },
    en: {
        guideBtn: "PRO MANUAL", online: "LIVE COMMUNITY", 
        pubH: "CREATE POST", pubB: "CONFIRM & UPLOAD", cancel: "CANCEL",
        view: "VIEW PROJECT", viewEx: "TRADE VIA TELEGRAM", 
        empty: "📭 No ads here yet. Be the first!",
        ok: "🚀 Your ad is now live!",
        errNoLink: "❌ Only text and @user in Exchanges. No links allowed.",
        errDup: "⚠️ This link was already posted today.",
        gTitle: "📋 SUCCESS MANUAL", gBtn: "GOT IT",
        gM1: "🤝 Clean Trades", gD1: "Write your offer and @username. Links are strictly forbidden here.",
        gM2: "🚀 Bots & Channels", gD2: "You can use links here. Make sure they work correctly.",
        gM3: "⏰ 24h Cycle", gD3: "All posts expire after 24h to keep the network updated. Post again tomorrow!"
    }
};

function iniciarApp(lang) {
    currentLang = lang;
    document.getElementById('lang-overlay').style.display = 'none';
    document.getElementById('app-content').style.display = 'flex';
    const t = langData[lang];
    document.getElementById('tr-guide-btn').innerText = t.guideBtn;
    document.getElementById('tr-online-text').innerText = t.online;
    document.getElementById('tr-p-h').innerText = t.pubH;
    document.getElementById('tr-p-b').innerText = t.pubB;
    document.getElementById('tr-cancel').innerText = t.cancel;
    loadData();
}

function notify(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 4000);
}

function loadData(category = activeCat) {
    activeCat = category;
    const ahora = Date.now();
    db.ref('posts').on('value', snap => {
        let items = []; let counts = { INTERCAMBIO: 0, BOTS: 0, CANALES: 0, GRUPOS: 0 };
        snap.forEach(child => {
            const p = child.val();
            if (ahora - p.time > 86400000) { db.ref('posts').child(child.key).remove(); return; }
            if(counts[p.category] !== undefined) counts[p.category]++;
            if(p.category === category) items.push({ key: child.key, ...p });
        });
        
        items.sort((a, b) => b.time - a.time);
        let html = "";
        items.forEach(p => {
            const isEx = p.category === 'INTERCAMBIO';
            html += `<div class="card">
                <div class="card-title" onmousedown="startPress('${p.key}')" onmouseup="endPress()" ontouchstart="startPress('${p.key}')" ontouchend="endPress()">
                    ${isEx ? p.desc : p.title}
                </div>
                <button class="btn-main" onclick="accion('${p.key}', '${isEx}', '${p.link||''}', '${p.desc||''}', '${p.user||''}')">
                    <i class="fas ${isEx ? 'fa-paper-plane' : 'fa-external-link-alt'}"></i> &nbsp; ${isEx ? langData[currentLang].viewEx : langData[currentLang].view}
                </button>
                <div class="card-meta">
                    <span><i class="fas fa-eye" style="color:var(--fb-blue)"></i> ${p.views || 0} VISTAS</span>
                    <span><i class="fas fa-history"></i> 24H ACTIVO</span>
                </div>
            </div>`;
        });
        document.getElementById('main-feed').innerHTML = html || `<p style="text-align:center; padding:50px; color:#aaa; font-weight:600;">${langData[currentLang].empty}</p>`;
        updateBadges(counts);
    });
}

function updateBadges(c) {
    const ids = { INTERCAMBIO: 'n-EX', BOTS: 'n-BO', CANALES: 'n-CA', GRUPOS: 'n-GR' };
    for (let cat in ids) {
        const b = document.getElementById(ids[cat]);
        if(b) { b.innerText = c[cat]; b.className = c[cat] > 0 ? "badge show" : "badge"; }
    }
}

function openPublish() {
    const t = langData[currentLang];
    document.getElementById('form-content').innerHTML = activeCat === 'INTERCAMBIO' ? 
        `<textarea id="p-desc" maxlength="120" placeholder="Ej: Cambio 50 USDT por BS Pago Móvil..." style="width:100%; padding:15px; border-radius:15px; border:1px solid #eee; margin-bottom:15px; height:100px; font-weight:600; outline:none;"></textarea>
         <input type="text" id="p-user" placeholder="@TuTelegram" style="width:100%; padding:15px; border-radius:15px; border:1px solid #eee; margin-bottom:20px; font-weight:700; outline:none;">` : 
        `<input type="text" id="p-title" maxlength="30" placeholder="Nombre de tu Proyecto" style="width:100%; padding:15px; border-radius:15px; border:1px solid #eee; margin-bottom:15px; font-weight:700; outline:none;">
         <input type="text" id="p-link" placeholder="t.me/enlace_oficial" style="width:100%; padding:15px; border-radius:15px; border:1px solid #eee; margin-bottom:20px; font-weight:600; outline:none;">`;
    document.getElementById('modal-pub').style.display = 'flex';
}

function publicar() {
    let data = { category: activeCat, time: Date.now(), views: 0 };
    if (activeCat === 'INTERCAMBIO') {
        data.desc = document.getElementById('p-desc').value.trim();
        data.user = document.getElementById('p-user').value.trim();
        if(!data.desc || !data.user) return;
        if (/(http|https|www|t\.me)/i.test(data.desc)) { notify(langData[currentLang].errNoLink); return; }
        if (!data.user.startsWith('@')) data.user = '@' + data.user;
    } else {
        data.title = document.getElementById('p-title').value.trim();
        data.link = document.getElementById('p-link').value.trim().toLowerCase();
        if(!data.title || !data.link) return;
    }
    
    if(typeof show_10747271 === 'function') show_10747271();
    db.ref('posts').push(data);
    notify(langData[currentLang].ok);
    closeModal('modal-pub');
}

function accion(postId, isEx, link, desc, user) {
    db.ref('posts').child(postId).child('views').transaction(v => (v || 0) + 1);
    adsShown++;
    if(adsShown >= 5) { if(typeof show_10747271 === 'function') show_10747271(); adsShown = 0; }

    if (isEx === 'true') {
        let msg = encodeURIComponent("Hola, vi tu anuncio en X Exchange:\n" + desc);
        window.open(`https://t.me/${user.replace('@', '')}?text=${msg}`, '_blank');
    } else {
        window.open(link.startsWith('http') ? link : 'https://' + link, '_blank');
    }
}

function openGuide() {
    const t = langData[currentLang];
    document.getElementById('tr-g-h').innerText = t.gTitle;
    document.getElementById('tr-g-b').innerText = t.gBtn;
    document.getElementById('guide-steps').innerHTML = `<div class="g-step"><h4>${t.gM1}</h4><p>${t.gD1}</p></div><div class="g-step"><h4>${t.gM2}</h4><p>${t.gD2}</p></div><div class="g-step"><h4>${t.gM3}</h4><p>${t.gD3}</p></div>`;
    document.getElementById('modal-guide').style.display = 'flex';
}

function filterCat(cat, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); loadData(cat);
}

function closeModal(id) { document.getElementById(id).style.display = 'none'; }

function startPress(id) { pressTimer = setTimeout(() => { if(prompt("ADMIN KEY:") === "231606") db.ref('posts').child(id).remove(); }, 5000); }
function endPress() { clearTimeout(pressTimer); }

setInterval(() => {
    document.getElementById('online-count').innerText = (2800 + Math.floor(Math.random()*50)).toLocaleString();
}, 4000);
</script>
