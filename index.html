<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X Exchange PRO</title>
    
    <script async src='//libtl.com/sdk.js' data-zone='10747271' data-sdk='show_10747271'></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;500;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --fb-blue: #1877F2; --bg-soft: #F0F2F5; --card-bg: #FFFFFF; --text-main: #1C1E21; --text-sub: #65676B; --accent: #31a24c; --gold: #f39c12; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-soft); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Capa de carga para evitar que vean el desorden mientras inicia Firebase */
        #lang-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .lang-card { background: #f8f9fa; padding: 30px; border-radius: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 85%; max-width: 350px; }
        
        #app-content { display: none; flex-direction: column; height: 100vh; }

        .header { padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); box-shadow: 0 4px 15px rgba(0,0,0,0.06); z-index: 100; }
        .logo { font-family: 'Orbitron'; color: var(--fb-blue); font-size: 20px; letter-spacing: 2px; font-weight: 800; }
        
        .online-status { font-size: 11px; color: var(--accent); font-weight: 800; padding: 12px 20px; background: #fff; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; }
        .dot { height: 10px; width: 10px; background-color: var(--accent); border-radius: 50%; display: inline-block; animation: blink 1.2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .cat-wrapper { background: #fff; border-bottom: 1px solid #eee; }
        .categories { display: flex; gap: 8px; overflow-x: auto; padding: 12px; scrollbar-width: none; }
        .cat-btn { background: #f0f2f5; border: none; color: var(--text-sub); padding: 10px 15px; border-radius: 15px; font-size: 12px; white-space: nowrap; font-weight: 700; transition: 0.2s; cursor: pointer; }
        .cat-btn.active { background: var(--fb-blue); color: #fff; }

        .feed { flex: 1; overflow-y: auto; padding: 20px 15px; padding-bottom: 100px; }
        .card { background: var(--card-bg); border-radius: 24px; padding: 20px; margin-bottom: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); border-left: 5px solid var(--fb-blue); transition: 0.2s; }
        .card:active { transform: scale(0.98); }
        .card-title { font-weight: 700; font-size: 14px; margin-bottom: 15px; color: #111; line-height: 1.4; }

        /* Botón arreglado para que no se pegue */
        .btn-action { background: #000; color: #fff; border: none; padding: 14px; width: 100%; border-radius: 15px; font-weight: 800; font-size: 13px; cursor: pointer; display: block; text-align: center; text-decoration: none; }
        
        .btn-plus { position: fixed; bottom: 25px; right: 20px; background: #000; color: #fff; width: 65px; height: 65px; border-radius: 50%; font-size: 24px; display: flex; align-items: center; justify-content: center; z-index: 100; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 4px solid #fff; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; backdrop-filter: blur(5px); }
        .modal-box { background: #fff; width: 100%; max-width: 400px; padding: 25px; border-radius: 30px; }

        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 12px; display: none; z-index: 2000; }
        .badge { background: #ff4757; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 8px; margin-left: 5px; display: none; }
        .badge.show { display: inline-block; }
    </style>
</head>
<body>

    <div id="lang-overlay">
        <div class="lang-card">
            <h2 style="font-family:'Orbitron'; color:var(--fb-blue); margin-bottom:10px;">X EXCHANGE</h2>
            <p style="color:gray; margin-bottom:25px; font-weight:700; font-size:12px;">ELIGE TU IDIOMA</p>
            <button class="btn-action" style="margin-bottom: 12px;" onclick="iniciarApp('es')">ESPAÑOL</button>
            <button class="btn-action" style="background:#fff; color:#000; border:2px solid #000;" onclick="iniciarApp('en')">ENGLISH</button>
        </div>
    </div>

    <div id="app-content">
        <div id="toast"></div>
        <div class="header">
            <div class="logo">X EXCHANGE</div>
            <button style="border:none; background:none; font-weight:800; font-size:12px; color:var(--fb-blue);" onclick="openGuide()">MANUAL</button>
        </div>
        
        <div class="online-status">
            <span class="dot"></span> <span id="online-text">USUARIOS ACTIVOS</span>: <span id="online-count">1,840</span>
        </div>

        <div class="cat-wrapper">
            <div class="categories">
                <button class="cat-btn active" onclick="filterCat('INTERCAMBIO', this)">Exchanges <span id="n-EX" class="badge"></span></button>
                <button class="cat-btn" onclick="filterCat('WHATSAPP', this)">WhatsApp <span id="n-WA" class="badge"></span></button>
                <button class="cat-btn" onclick="filterCat('BOTS', this)">Bots <span id="n-BO" class="badge"></span></button>
                <button class="cat-btn" onclick="filterCat('CANALES', this)">Canales <span id="n-CA" class="badge"></span></button>
            </div>
        </div>

        <div id="main-feed" class="feed"></div>
        
        <button class="btn-plus" onclick="openPublish()"><i class="fas fa-plus"></i></button>

        <div id="modal-pub" class="modal" onclick="if(event.target==this) closeModal('modal-pub')">
            <div class="modal-box">
                <h3 style="text-align:center; margin-bottom:20px;">Nuevo Anuncio</h3>
                <div id="form-content"></div>
                <button class="btn-action" style="margin-top:15px; background:var(--fb-blue);" onclick="publicar()">PUBLICAR</button>
            </div>
        </div>
    </div>

<script>
const firebaseConfig = { apiKey: "AIzaSyC5ObLcwYBLrwVU2ZNqCnBDgarTa88DFJE", authDomain: "fruithunter-b5d2d.firebaseapp.com", databaseURL: "https://fruithunter-b5d2d-default-rtdb.firebaseio.com", projectId: "fruithunter-b5d2d", storageBucket: "fruithunter-b5d2d.appspot.com", messagingSenderId: "910354867578", appId: "1:910354867578:web:30c5a30058c621116622c3" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let activeCat = 'INTERCAMBIO';
let totalClicks = 0;

function iniciarApp(lang) {
    document.getElementById('lang-overlay').style.fadeOut = "300ms";
    setTimeout(() => {
        document.getElementById('lang-overlay').style.display = 'none';
        document.getElementById('app-content').style.display = 'flex';
        loadData();
    }, 300);
}

function loadData() {
    db.ref('posts').on('value', snap => {
        let html = "";
        let counts = { INTERCAMBIO: 0, BOTS: 0, CANALES: 0, WHATSAPP: 0 };
        
        snap.forEach(child => {
            const p = child.val();
            counts[p.category]++;
            
            if(p.category === activeCat) {
                const isEx = p.category === 'INTERCAMBIO';
                const label = isEx ? 'NEGOCIAR AHORA' : (p.category === 'WHATSAPP' ? 'ABRIR WHATSAPP' : 'VER PROYECTO');
                const icon = p.category === 'WHATSAPP' ? 'fab fa-whatsapp' : 'fas fa-external-link-alt';

                html += `
                <div class="card">
                    <div class="card-title">${isEx ? p.desc : p.title}</div>
                    <button class="btn-action" onclick="manejarClic('${child.key}', '${isEx}', '${p.link||''}', '${p.user||''}', '${p.desc||''}', '${p.category}')">
                        <i class="${icon}"></i> ${label}
                    </button>
                </div>`;
            }
        });
        document.getElementById('main-feed').innerHTML = html || '<p style="text-align:center; color:gray; margin-top:50px;">Cargando ofertas...</p>';
        updateBadges(counts);
    });
}

// LOGICA DEFINITIVA PARA EVITAR QUE SE PEGUE Y SALTE EL ANUNCIO CORRECTAMENTE
function manejarClic(id, isEx, link, user, desc, category) {
    totalClicks++;
    
    // Solo mostrar anuncio cada 5 clics para que no sea "a lo loco"
    if (totalClicks % 5 === 0) {
        if(typeof show_10747271 === 'function') {
            show_10747271();
        }
    }

    // Ejecutar redirección de inmediato (sin esperar al anuncio)
    if (isEx === 'true') {
        let userClean = user.replace('@', '').trim();
        // Usar tg:// directo
        window.location.href = `tg://resolve?domain=${userClean}&text=${encodeURIComponent("Hola, vi tu oferta: " + desc)}`;
    } else {
        redirigirForzado(link, category);
    }
}

function redirigirForzado(link, category) {
    if (category === 'WHATSAPP') {
        // Limpiar el link para sacar solo el código o número
        let clean = link.replace(/https?:\/\/(wa\.me|chat\.whatsapp\.com|api\.whatsapp\.com\/send\?phone=)\//, '').split('?')[0];
        
        // Protocolos nativos que saltan el error del pato
        if (link.includes('chat.whatsapp.com')) {
            window.location.href = `whatsapp://chat?code=${clean}`;
        } else {
            let phone = clean.replace(/[^0-9]/g, '');
            window.location.href = `whatsapp://send?phone=${phone}`;
        }
    } else if (category === 'BOTS' || category === 'CANALES') {
        let tgUser = link.replace(/https?:\/\/t\.me\//, '').split('/')[0];
        window.location.href = `tg://resolve?domain=${tgUser}`;
    } else {
        window.open(link.startsWith('http') ? link : 'https://' + link, '_blank');
    }
}

function updateBadges(c) {
    const map = { INTERCAMBIO: 'n-EX', WHATSAPP: 'n-WA', BOTS: 'n-BO', CANALES: 'n-CA' };
    for (let k in map) {
        let b = document.getElementById(map[k]);
        if(b) { b.innerText = c[k] || 0; b.className = c[k] > 0 ? "badge show" : "badge"; }
    }
}

function filterCat(cat, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = cat;
    loadData();
}

function openPublish() {
    document.getElementById('form-content').innerHTML = activeCat === 'INTERCAMBIO' ? 
        `<textarea id="p-desc" placeholder="¿Qué vendes o compras?" style="width:100%; height:80px; padding:10px; border-radius:10px; border:1px solid #ddd;"></textarea>
         <input type="text" id="p-user" placeholder="@TuUsuarioTelegram" style="width:100%; padding:10px; margin-top:10px; border-radius:10px; border:1px solid #ddd;">` :
        `<input type="text" id="p-title" placeholder="Nombre del proyecto" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd;">
         <input type="text" id="p-link" placeholder="Link (t.me o wa.me)" style="width:100%; padding:10px; margin-top:10px; border-radius:10px; border:1px solid #ddd;">`;
    document.getElementById('modal-pub').style.display = 'flex';
}

function publicar() {
    const data = {
        category: activeCat,
        desc: document.getElementById('p-desc')?.value || '',
        user: document.getElementById('p-user')?.value || '',
        title: document.getElementById('p-title')?.value || '',
        link: document.getElementById('p-link')?.value || '',
        time: Date.now()
    };
    db.ref('posts').push(data).then(() => { closeModal('modal-pub'); });
}

function closeModal(id) { document.getElementById(id).style.display = 'none'; }

setInterval(() => {
    document.getElementById('online-count').innerText = (1800 + Math.floor(Math.random()*50)).toLocaleString();
}, 3000);
</script>
</body>
</html>
