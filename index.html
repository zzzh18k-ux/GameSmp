<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xchange Elite Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://adsgram.ai/sdk.js"></script>

    <style>
        :root { --bg: #000; --card: #111; --accent: #24a1de; --text: #fff; --sec: #8e8e93; --brd: rgba(255,255,255,0.08); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 15px; padding-bottom: 90px; }
        
        .radar { background: var(--card); border: 1px solid var(--brd); border-radius: 12px; padding: 10px; display: flex; justify-content: space-around; margin-bottom: 15px; }
        .stat { text-align: center; }
        .stat-n { display: block; font-weight: 800; color: var(--accent); font-size: 14px; }
        .stat-t { font-size: 8px; text-transform: uppercase; color: var(--sec); }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .lang-s { background: var(--card); border: 1px solid var(--brd); color: #fff; padding: 5px; border-radius: 8px; font-size: 12px; }

        .box { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--brd); margin-bottom: 20px; }
        .lbl { font-size: 10px; font-weight: 700; color: var(--sec); text-transform: uppercase; margin-bottom: 8px; display: block; }
        
        .s-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 15px; }
        .s-btn { aspect-ratio: 1/1; background: #1c1c1e; border: 1px solid var(--brd); border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .s-btn svg { width: 20px; fill: var(--sec); }
        .s-btn.active { border-color: var(--accent); background: rgba(36,161,222,0.15); }
        .s-btn.active svg { fill: var(--accent); }

        input, textarea { width: 100%; background: #1c1c1e; border: 1px solid var(--brd); border-radius: 12px; padding: 12px; color: #fff; margin-bottom: 12px; outline: none; font-size: 14px; }
        .btn-p { background: var(--accent); color: #fff; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; }

        .card { background: var(--card); border-radius: 15px; padding: 15px; border: 1px solid var(--brd); margin-bottom: 10px; }
        .u-tag { color: var(--accent); font-weight: 700; font-size: 13px; margin-bottom: 8px; display: block; }
        .btn-c { background: #fff; color: #000; padding: 8px 15px; border-radius: 10px; font-size: 12px; font-weight: 700; text-decoration: none; }

        .nav { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: rgba(17,17,17,0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--brd); z-index: 1000; }
        .nav-a { text-align: center; color: var(--sec); text-decoration: none; font-size: 10px; }
        .nav-a svg { width: 22px; display: block; margin: 0 auto 3px; fill: var(--sec); }
        .nav-a.active { color: var(--accent); }
        .nav-a.active svg { fill: var(--accent); }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #fff; color: #000; padding: 10px 20px; border-radius: 20px; font-weight: 700; transition: 0.4s; z-index: 9999; }
        #toast.v { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div id="toast">OFERTA ENVIADA</div>

<div class="radar">
    <div class="stat"><span class="stat-n">1,452</span><span class="stat-t" id="l-u">Usuarios</span></div>
    <div class="stat"><span class="stat-n" id="count-t">0</span><span class="stat-t" id="l-t">Tratos</span></div>
    <div class="stat"><span class="stat-n" style="color:#4cd964">ON</span><span class="stat-t" id="l-s">Server</span></div>
</div>

<header class="header">
    <div style="font-weight:800; font-size:18px">Xchange Elite</div>
    <select class="lang-s" id="l-sel">
        <option value="es">🇪🇸 ES</option>
        <option value="en">🇺🇸 EN</option>
    </select>
</header>

<div class="box">
    <span class="lbl" id="l-ch">Canal Enlace</span>
    <div class="s-grid">
        <div class="s-btn active" onclick="setPlat('tg', this)"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8l-1.13 7.19c-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-3.53 2.39-5.35 3.6-5.46 3.62-.51.35-.98.52-1.4.51-.46-.01-1.35-.26-2.01-.48-.81-.27-1.45-.42-1.39-.89.03-.25.38-.51 1.05-.78 1.37-.58 4.12-1.76 8.24-3.55 3.92-1.66 4.73-1.95 5.27-1.96.12 0 .38.03.55.17.14.12.18.28.19.39 0 .14 0 .28-.01.41z"/></svg></div>
        <div class="s-btn" onclick="setPlat('tk', this)"><svg viewBox="0 0 24 24"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg></div>
    </div>
    <span class="lbl" id="l-co">ID Contacto</span>
    <input type="text" id="u-id" placeholder="@usuario">
    <span class="lbl" id="l-ms">Propuesta</span>
    <textarea id="u-ms" rows="2" placeholder="Detalles de tu oferta..."></textarea>
    <button class="btn-p" onclick="publishTrade()" id="l-btn">PUBLICAR EN MERCADO</button>
</div>

<div id="feed"></div>

<nav class="nav">
    <a href="#" class="nav-a active"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>INICIO</a>
    <a href="https://t.me/XchangeEliteOficial" class="nav-a" target="_blank"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8l-1.13 7.19c-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-3.53 2.39-5.35 3.6-5.46 3.62-.51.35-.98.52-1.4.51-.46-.01-1.35-.26-2.01-.48-.81-.27-1.45-.42-1.39-.89.03-.25.38-.51 1.05-.78 1.37-.58 4.12-1.76 8.24-3.55 3.92-1.66 4.73-1.95 5.27-1.96.12 0 .38.03.55.17.14.12.18.28.19.39 0 .14 0 .28-.01.41z"/></svg>CANAL</a>
</nav>

<script>
    // Configuración Inmediata
    const fb = firebase.initializeApp({ databaseURL: "https://fruithunter-b5d2d-default-rtdb.firebaseio.com" });
    const db = fb.database();
    let plat = 'tg';

    const i18n = {
        es: { u:"Usuarios", t:"Tratos Hoy", s:"Server", ch:"Canal Enlace", co:"ID Contacto", ms:"Propuesta", btn:"PUBLICAR EN MERCADO", toast:"OFERTA ENVIADA", con:"CONTACTAR" },
        en: { u:"Users", t:"Today's Deals", s:"Server", ch:"Link Channel", co:"Contact ID", ms:"Proposal", btn:"PUBLISH ON MARKET", toast:"OFFER SENT", con:"CONTACT" }
    };

    function setPlat(p, el) {
        document.querySelectorAll('.s-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        plat = p;
    }

    function publishTrade() {
        const u = document.getElementById('u-id').value.trim();
        const m = document.getElementById('u-ms').value.trim();
        if(!u || !m) return alert("Completa los campos");

        if(window.Adsgram) window.Adsgram.init({ blockId: "18897" }).show().catch(() => {});

        db.ref('elite_trades_v2').push({
            u: u, m: m, p: plat, t: Date.now(), v: Math.floor(Math.random()*300)+100
        }).then(() => {
            document.getElementById('u-ms').value = "";
            const t = document.getElementById('toast');
            t.classList.add('v');
            setTimeout(() => t.classList.remove('v'), 2500);
        });
    }

    db.ref('elite_trades_v2').on('value', (snap) => {
        const f = document.getElementById('feed');
        const l = document.getElementById('l-sel').value;
        f.innerHTML = "";
        let posts = [];
        snap.forEach(c => posts.push(c.val()));
        document.getElementById('count-t').innerText = posts.length;

        posts.reverse().forEach(i => {
            const link = i.p === 'tg' ? `https://t.me/${i.u.replace('@','')}` : i.u;
            f.innerHTML += `
            <div class="card">
                <span class="u-tag">${i.u}</span>
                <div style="font-size:14px; margin-bottom:12px; line-height:1.4">${i.m}</div>
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <span style="font-size:10px; color:var(--sec)">👁️ ${i.v || 0} • ${i.p.toUpperCase()}</span>
                    <a href="${link}" class="btn-c" target="_blank">${i18n[l].con}</a>
                </div>
            </div>`;
        });
    });

    document.getElementById('l-sel').onchange = (e) => {
        const l = i18n[e.target.value];
        document.getElementById('l-u').innerText = l.u;
        document.getElementById('l-t').innerText = l.t;
        document.getElementById('l-s').innerText = l.s;
        document.getElementById('l-ch').innerText = l.ch;
        document.getElementById('l-co').innerText = l.co;
        document.getElementById('l-ms').innerText = l.ms;
        document.getElementById('l-btn').innerText = l.btn;
        document.getElementById('toast').innerText = l.toast;
    };
</script>
</body>
</html>
