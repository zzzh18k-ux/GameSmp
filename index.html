<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xgrab USDT - Protocolo de Validación</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='10278425' data-sdk='show_10278425'></script>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --bg: #f8f5f0; 
            --panel: #ffffff; 
            --accent: #c99b67; 
            --text: #3d3d3d;
            --gold: #b0895d;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; padding: 0; background: var(--bg); color: var(--text); 
            font-family: 'Montserrat', sans-serif; height: 100vh; width: 100vw;
            overflow: hidden; user-select: none; 
        }

        #main-ui { padding: 20px; height: 100%; display: flex; flex-direction: column; }

        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .protocol-label { font-size: 10px; font-weight: 800; letter-spacing: 2px; color: var(--accent); }
        .user-badge { background: var(--panel); padding: 5px 12px; border-radius: 50px; font-size: 10px; font-weight: 700; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        .vault-card { 
            background: var(--panel); border-radius: 30px; padding: 40px 20px; text-align: center; 
            box-shadow: 0 15px 35px rgba(201, 155, 103, 0.15); border: 1px solid rgba(201, 155, 103, 0.1);
            margin-bottom: 25px;
        }
        .vault-amount { font-family: 'Playfair Display', serif; font-size: 50px; color: var(--gold); margin: 10px 0; font-weight: 900; }
        .vault-sub { font-size: 11px; color: #a0a0a0; font-weight: 600; }

        .btn-main { 
            background: linear-gradient(135deg, var(--accent), var(--gold)); color: #fff; 
            width: 100%; padding: 22px; border-radius: 20px; border: none; 
            font-weight: 800; font-size: 16px; letter-spacing: 1px;
            box-shadow: 0 10px 25px rgba(176, 137, 93, 0.4); margin-bottom: 25px;
            cursor: pointer;
        }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: auto; padding-bottom: 10px; }
        .menu-item { 
            background: var(--panel); border-radius: 22px; padding: 20px; text-align: center; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.01);
            cursor: pointer;
        }
        .menu-item i { color: var(--accent); font-size: 22px; margin-bottom: 10px; display: block; }
        .menu-item span { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(248, 245, 240, 0.98); z-index: 2000; 
            display: none; justify-content: center; align-items: center; padding: 20px; 
        }
        .modal-content { 
            background: var(--panel); border-radius: 35px; padding: 35px 25px; width: 100%; 
            text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.12); border: 1px solid #eee;
        }
        
        .network-stat-container {
            background: #fdfbf8; border: 1px solid #f0e6da; border-radius: 25px; 
            padding: 30px 15px; margin: 20px 0;
        }
        .stat-big { font-size: 48px; font-family: 'Playfair Display', serif; color: var(--gold); font-weight: 900; line-height: 1; }
        .stat-label { font-size: 12px; font-weight: 800; color: #b5b5b5; letter-spacing: 1px; margin-top: 5px; display: block; }
        
        input { 
            width: 100%; padding: 18px; margin: 15px 0; background: #f8f8f8; 
            border: 1px solid #eee; border-radius: 15px; color: var(--text); 
            text-align: center; font-family: 'Montserrat'; font-weight: 600;
        }

        /* LOADING ANIMATION FOR TASKS */
        #task-loader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); z-index: 3000; display: none; 
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .spinner { width: 50px; height: 50px; border: 5px solid #eee; border-top: 5px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="main-ui">
        <div class="header-top">
            <span class="protocol-label">XGRAB GLOBAL PROTOCOL</span>
            <div class="user-badge">ID: <span id="display-id">---</span></div>
        </div>

        <div class="vault-card">
            <div class="vault-sub">ACTIVOS EN VALIDACIÓN (USDT)</div>
            <div class="vault-amount">$<span id="ui-balance">0.0000</span></div>
            <div style="font-size:10px; color:#c0c0c0; font-weight:700;">PROGRESO: <span id="ads-count">0</span> / 15 TAREAS</div>
        </div>

        <button class="btn-main" onclick="startTaskProcessing()">INICIAR TAREA DE VALIDACIÓN</button>

        <div class="menu-grid">
            <div class="menu-item" onclick="openModal('withdraw')"><i class="fas fa-wallet"></i><span>Liquidación</span></div>
            <div class="menu-item" onclick="openModal('ref')"><i class="fas fa-users-between-lines"></i><span>Mi Red</span></div>
            <div class="menu-item" onclick="openModal('hist')"><i class="fas fa-file-contract"></i><span>Historial</span></div>
            <div class="menu-item" onclick="openModal('welcome')"><i class="fas fa-circle-info"></i><span>Guía</span></div>
        </div>
    </div>

    <div id="task-loader">
        <div class="spinner"></div>
        <h2 style="font-family:'Playfair Display';">Sincronizando Nodo...</h2>
        <p style="font-size:12px; color:#999; width:80%;">Por favor, espere mientras el protocolo valida su sesión de seguridad.</p>
    </div>

    <div id="sys-modal" class="modal"><div class="modal-content" id="modal-inner"></div></div>

    <script>
        // FIREBASE CONFIG DESDE SU CAPTURA
        const firebaseConfig = {
            apiKey: "AIzaSyC5ObLcwYBLrwVU2ZNqCnBDgarTa88DFJE",
            authDomain: "fruithunter-b5d2d.firebaseapp.com",
            databaseURL: "https://fruithunter-b5d2d-default-rtdb.firebaseio.com",
            projectId: "fruithunter-b5d2d",
            storageBucket: "fruithunter-b5d2d.appspot.com",
            messagingSenderId: "910354867578",
            appId: "1:910354867578:web:30c5a30058c621116622c3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const TOKEN = "7981775992:AAGmBMWU2jQEL_hstigComicKPUSAqM1qPg", CANAL = "@ALSKSNNSLSMS";

        let userUID = localStorage.getItem('xgrab_uid') || "USR" + Math.floor(Math.random()*89999 + 10000);
        localStorage.setItem('xgrab_uid', userUID);
        document.getElementById('display-id').innerText = userUID;

        let balance = 0, adsToday = 0;

        db.ref('users/' + userUID).on('value', snap => {
            const d = snap.val();
            if(!d) {
                const inviter = new URLSearchParams(window.location.search).get('start');
                db.ref('users/' + userUID).set({ balance: 0, adsToday: 0, invitedBy: inviter || null });
                openModal('welcome');
            } else {
                balance = d.balance || 0;
                adsToday = d.adsToday || 0;
                document.getElementById('ui-balance').innerText = balance.toFixed(4);
                document.getElementById('ads-count').innerText = adsToday;
            }
        });

        // SISTEMA DE TAREAS (REEMPLAZA AL JUEGO)
        function startTaskProcessing() {
            if(adsToday >= 15) return alert("Seguridad: Límite diario de 15 tareas alcanzado.");
            
            const ad = window.Adsgram.init({ blockId: "18897" });
            ad.show().then(() => {
                // Simulación de "Tarea" después del anuncio
                document.getElementById('task-loader').style.display = 'flex';
                
                setTimeout(() => {
                    const gain = 0.0008;
                    adsToday++;
                    db.ref('users/' + userUID).update({ 
                        balance: balance + gain,
                        adsToday: adsToday 
                    });
                    
                    // Comisión al Mentor
                    db.ref('users/' + userUID + '/invitedBy').once('value', s => {
                        const boss = s.val();
                        if(boss) db.ref('users/' + boss + '/balance').transaction(b => (b || 0) + (gain * 0.1));
                    });

                    document.getElementById('task-loader').style.display = 'none';
                    alert("Tarea Finalizada: Nodo validado exitosamente.");
                }, 4000); // 4 segundos de "Carga de Tarea" para profesionalismo
            }).catch(() => alert("Error de protocolo: Debe completar la visualización del anuncio."));
        }

        function openModal(type) {
            const inner = document.getElementById('modal-inner');
            if(type === 'ref') {
                const link = `https://t.me/XgrabUSDTbot?start=${userUID}`;
                inner.innerHTML = `
                    <h2 style="margin-bottom:5px;">Infraestructura de Red</h2>
                    <p style="font-size:10px; color:#999; text-transform:uppercase; letter-spacing:1px;">Expansión de Nodos Activos</p>
                    
                    <div class="network-stat-container">
                        <span class="stat-big" id="count-ref">...</span>
                        <span class="stat-label">SOCIOS EN TU RED</span>
                        <div style="height:1px; background:#f0e6da; margin:15px 0;"></div>
                        <p style="font-size:11px; color:var(--accent); font-weight:700;">Recibes el 10% de rendimiento por cada tarea que complete tu equipo.</p>
                    </div>

                    <p style="font-size:12px; color:#666; font-weight:600;">Enlace de Reclutamiento:</p>
                    <input type="text" value="${link}" id="refLink" readonly>
                    <button class="btn-main" onclick="copyRef()">COPIAR MI ENLACE</button>
                    <p onclick="closeModal()" style="font-size:12px; cursor:pointer; color:#ccc;">REGRESAR AL PANEL</p>
                `;
                db.ref('users').orderByChild('invitedBy').equalTo(userUID).on('value', s => {
                    document.getElementById('count-ref').innerText = s.numChildren() || 0;
                });
            } else if(type === 'withdraw') {
                inner.innerHTML = `
                    <h2>Liquidación de Activos</h2>
                    <p style="font-size:12px; color:#888; line-height:1.5;">El retiro mínimo es de <b>$1.00 USDT</b> para asegurar la viabilidad del nodo en la red <b>Polygon (MATIC)</b>.</p>
                    <input type="text" id="w-wallet" placeholder="Dirección USDT (Red Polygon)">
                    <button class="btn-main" onclick="requestSecurePay()">SOLICITAR LIQUIDACIÓN</button>
                    <p onclick="closeModal()" style="font-size:12px; cursor:pointer; color:#ccc;">CANCELAR</p>
                `;
            } else if(type === 'welcome') {
                inner.innerHTML = `
                    <i class="fas fa-shield-check" style="font-size:40px; color:var(--accent); margin-bottom:15px;"></i>
                    <h2>Acceso Autorizado</h2>
                    <p style="font-size:13px; line-height:1.6; color:#666;">Has ingresado al <b>Protocolo Xgrab</b>. <br><br>Tu labor consiste en validar 15 nodos publicitarios diarios. Al completar cada validación, el sistema acreditará USDT en tu bóveda de forma inmediata.</p>
                    <button class="btn-main" onclick="closeModal()">COMENZAR TAREAS</button>
                `;
            }
            document.getElementById('sys-modal').style.display = 'flex';
        }

        function requestSecurePay() {
            const w = document.getElementById('w-wallet').value;
            if(balance < 1.0) return alert("Balance insuficiente para sincronizar liquidación.");
            if(w.length < 20) return alert("Dirección de red Polygon no reconocida.");
            
            const amt = balance.toFixed(4);
            const msg = `🏛 *PROTOCOLO DE LIQUIDACIÓN*\n\n✅ *Retiro Solicitado*\n👤 Usuario: \`${userUID}\`\n💰 Monto: $${amt} USDT\n📍 Red: *Polygon (MATIC)*\n🔗 Wallet: \`${w}\``;
            
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CANAL}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
            db.ref('users/' + userUID + '/historial').push({ monto: amt, fecha: new Date().toLocaleString(), status: "ÉXITO" });
            db.ref('users/' + userUID).update({ balance: 0 });

            alert("Operación Exitosa. Los fondos han sido enviados a procesamiento de red.");
            closeModal();
        }

        function closeModal() { document.getElementById('sys-modal').style.display = 'none'; }
        function copyRef() { document.getElementById('refLink').select(); document.execCommand('copy'); alert("Enlace copiado. ¡Invita a nuevos socios!"); }
    </script>
</body>
</html>
