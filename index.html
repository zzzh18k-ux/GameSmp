 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xchange Elite | Global Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src='//libtl.com/sdk.js' data-zone='10278425' data-sdk='show_10278425'></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://adsgram.ai/sdk.js"></script>

    <style>
        :root {
            --bg: #000000;
            --card-bg: #111111;
            --accent: #24a1de;
            --text-main: #ffffff;
            --text-secondary: #8e8e93;
            --border: rgba(255, 255, 255, 0.08);
            --input-bg: #1c1c1e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-main); padding: 16px; padding-bottom: 100px; }

        .radar-top { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 10px; display: flex; justify-content: space-around; margin-bottom: 15px; }
        .stat-box { text-align: center; }
        .stat-num { display: block; font-weight: 800; color: var(--accent); font-size: 14px; }
        .stat-txt { font-size: 8px; text-transform: uppercase; color: var(--text-secondary); }

        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; }
        .brand-name { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }

        .form-section { background: var(--card-bg); border-radius: 24px; padding: 24px; border: 1px solid var(--border); margin-bottom: 24px; }
        input, textarea { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 14px; padding: 16px; color: #fff; font-size: 15px; margin-bottom: 15px; outline: none; }
        .btn-main { background: var(--accent); color: #fff; border: none; width: 100%; padding: 18px; border-radius: 16px; font-weight: 700; font-size: 16px; cursor: pointer; }

        .post-card { background: var(--card-bg); border-radius: 20px; padding: 18px; border: 1px solid var(--border); margin-bottom: 12px; animation: slide 0.3s ease; position: relative; }
        .user-tag { color: var(--accent); font-weight: 700; font-size: 14px; }
        .activity-pill { background: rgba(255, 255, 255, 0.05); padding: 4px 10px; border-radius: 8px; font-size: 10px; color: var(--text-secondary); float: right; }
        .post-content { font-size: 15px; color: #efeff4; margin: 12px 0; line-height: 1.4; }
        .btn-contact { background: #fff; color: #000; padding: 10px 18px; border-radius: 12px; font-size: 13px; font-weight: 700; text-decoration: none; display: inline-block; }

        @keyframes slide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="radar-top">
        <div class="stat-box"><span class="stat-num">Elite</span><span class="stat-txt">Market</span></div>
        <div class="stat-box"><span class="stat-num" id="count-traders">...</span><span class="stat-txt">Activos</span></div>
        <div class="stat-box"><span class="stat-num" style="color: #4cd964;">LIVE</span><span class="stat-txt">24h System</span></div>
    </div>

    <header class="header">
        <span class="brand-name">Xchange Elite</span>
    </header>

    <main class="form-section">
        <input type="text" id="user-id" placeholder="@tu_usuario">
        <input type="text" id="activity-tag" placeholder="¿Qué ofreces? (Ej: Pago USDT)">
        <textarea id="trade-msg" rows="3" placeholder="Detalles de la oferta..."></textarea>
        <button class="btn-main" onclick="publishTrade()">PUBLICAR Y VER ANUNCIO</button>
    </main>

    <div id="muro-elite"></div>

    <script>
        // CONFIGURACIÓN
        const firebaseConfig = {
            apiKey: "AIzaSyAs-7N0P0E1_zR8XqW2M6V5Y4T3L1_v0U9", 
            databaseURL: "https://fruithunter-b5d2d-default-rtdb.firebaseio.com",
            projectId: "fruithunter-b5d2d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const AdController = window.Adsgram ? window.Adsgram.init({ blockId: "18897" }) : null;

        // 1. LIMPIEZA AUTOMÁTICA (Borra posts de más de 24 horas)
        function autoClean() {
            const timeLimit = Date.now() - (24 * 60 * 60 * 1000);
            db.ref('elite_trades_v2').orderByChild('t').endAt(timeLimit).once('value', (snap) => {
                snap.forEach((child) => { child.ref.remove(); });
            });
        }

        function publishTrade() {
            const u = document.getElementById('user-id').value.trim();
            const tag = document.getElementById('activity-tag').value.trim();
            const msg = document.getElementById('trade-msg').value.trim();
            
            if(!u || !tag || !msg) return alert("Rellena todo");

            db.ref('elite_trades_v2').push({
                u: u, tag: tag, msg: msg, t: Date.now()
            }).then(() => {
                document.getElementById('trade-msg').value = "";
                if(AdController) AdController.show().catch(()=>{});
            });
        }

        // 2. CARGA Y RENDERIZADO
        db.ref('elite_trades_v2').on('value', (snap) => {
            autoClean(); // Limpia cada vez que hay un cambio
            const feed = document.getElementById('muro-elite');
            feed.innerHTML = "";
            let posts = [];
            snap.forEach(c => { posts.push(c.val()); });
            
            document.getElementById('count-traders').innerText = posts.length;

            posts.reverse().forEach(v => {
                feed.innerHTML += `
                    <div class="post-card">
                        <span class="activity-pill">${v.tag}</span>
                        <span class="user-tag">${v.u}</span>
                        <div class="post-content">${v.msg}</div>
                        <a href="https://t.me/${v.u.replace('@','')}" class="btn-contact" target="_blank">CONTACTAR</a>
                    </div>`;
            });
        });
    </script>
</body>
</html>
