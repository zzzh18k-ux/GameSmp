<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xgrab HUB - Intercambio Real</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --card: #121214; --accent: #0088cc; --gold: #ffcc00; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .categories { display: flex; gap: 10px; overflow-x: auto; padding: 15px; border-bottom: 1px solid #1a1a1a; }
        .cat-btn { background: #222; border: 1px solid #444; color: #888; padding: 8px 15px; border-radius: 10px; font-size: 11px; white-space: nowrap; cursor: pointer; }
        .cat-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .feed { flex: 1; overflow-y: scroll; padding: 15px; padding-bottom: 80px; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid #222; }
        .card-title { font-size: 16px; font-weight: bold; margin-bottom: 5px; color: var(--gold); }
        .card-link { font-size: 12px; color: #888; margin-bottom: 10px; word-break: break-all; }
        .btn-go { background: var(--accent); color: white; border: none; padding: 8px; width: 100%; border-radius: 8px; font-weight: bold; text-decoration: none; display: block; text-align: center; }

        /* FORMULARIO (MODAL) */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; flex-direction: column; padding: 20px; }
        input, select { background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; margin-bottom: 15px; width: 100%; }
        
        .fab { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; background: var(--accent); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; box-shadow: 0 5px 15px rgba(0,136,204,0.4); border: none; color: white; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight:900; color:var(--gold);">XGRAB HUB</div>
    <div style="font-size:10px; color:#27ae60;">● <span id="online">1,240</span> ONLINE</div>
</div>

<div class="categories" id="cat-bar">
    <button class="cat-btn active" onclick="filterCat('TODOS', this)">TODOS</button>
    <button class="cat-btn" onclick="filterCat('BOTS', this)">🤖 BOTS</button>
    <button class="cat-btn" onclick="filterCat('CANALES', this)">📣 CANALES</button>
    <button class="cat-btn" onclick="filterCat('GRUPOS', this)">👥 GRUPOS</button>
</div>

<div class="feed" id="main-feed">
    </div>

<button class="fab" onclick="document.getElementById('modal').style.display='flex'"><i class="fas fa-plus"></i></button>

<div class="modal" id="modal">
    <h2 style="margin-bottom:20px;">Publicar Intercambio</h2>
    <select id="p-cat">
        <option value="BOTS">🤖 BOT DE TELEGRAM</option>
        <option value="CANALES">📣 CANAL</option>
        <option value="GRUPOS">👥 GRUPO</option>
    </select>
    <input type="text" id="p-title" placeholder="Título (Ej: Mi Canal Cripto)">
    <input type="text" id="p-link" placeholder="Link (https://t.me/...)">
    <input type="text" id="p-user" placeholder="Tu @Usuario de Telegram">
    <button class="btn-go" onclick="publicar()">SUBIR AHORA</button>
    <button onclick="document.getElementById('modal').style.display='none'" style="background:none; border:none; color:#666; margin-top:15px;">CANCELAR</button>
</div>

<script>
// CONFIGURACIÓN USANDO TUS DATOS DE LA FOTO
const firebaseConfig = {
    apiKey: "AIzaSyC5ObLcwYBLrwVU2ZNqCnBDgarTa88DFJE",
    authDomain: "fruithunter-b5d2d.firebaseapp.com",
    databaseURL: "https://fruithunter-b5d2d-default-rtdb.firebaseio.com",
    projectId: "fruithunter-b5d2d",
    storageBucket: "fruithunter-b5d2d.appspot.com",
    messagingSenderId: "910354867578",
    appId: "1:910354867578:web:30c5a30058c621116622c3"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const tg = window.Telegram.WebApp;

// CARGAR DATOS
function loadData(category = 'TODOS') {
    db.ref('posts').on('value', snap => {
        const feed = document.getElementById('main-feed');
        feed.innerHTML = '';
        snap.forEach(child => {
            const p = child.val();
            if(category === 'TODOS' || p.category === category) {
                feed.innerHTML += `
                <div class="card">
                    <div style="font-size:9px; color:var(--accent); font-weight:bold;">${p.category}</div>
                    <div class="card-title">${p.title}</div>
                    <div class="card-link">${p.link}</div>
                    <a href="${p.link}" class="btn-go" onclick="window.open('${p.link}')">VISITAR</a>
                </div>`;
            }
        });
    });
}

// PUBLICAR
function publicar() {
    const cat = document.getElementById('p-cat').value;
    const title = document.getElementById('p-title').value;
    const link = document.getElementById('p-link').value;
    const user = document.getElementById('p-user').value;

    if(!title || !link) return alert("Llena los campos");

    db.ref('posts').push({
        category: cat,
        title: title,
        link: link,
        user: user,
        time: new Date().getTime()
    }).then(() => {
        document.getElementById('modal').style.display = 'none';
        alert("¡Publicado con éxito!");
    });
}

function filterCat(cat, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadData(cat);
}

// SIMULACIÓN DE OJOS
setInterval(() => {
    document.getElementById('online').innerText = (1200 + Math.floor(Math.random()*400)).toLocaleString();
}, 3000);

loadData();
</script>
</body>
</html>
