<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FruitHunter Ultra</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.2);
            --blur: blur(10px);
            --grad: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
        }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: #0f172a; 
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            margin: 0; padding: 15px; color: #fff; min-height: 100vh;
        }
        .header {
            text-align: center; padding: 20px;
            background: var(--glass); backdrop-filter: var(--blur);
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 25px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .card-post {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: var(--blur);
            padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        input, textarea {
            width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; margin: 10px 0; border-radius: 12px; color: #fff; font-size: 16px; outline: none;
        }
        input:focus, textarea:focus { border-color: #00c6ff; box-shadow: 0 0 10px rgba(0,198,255,0.3); }
        
        button {
            background: var(--grad); color: white; border: none; padding: 15px;
            width: 100%; border-radius: 12px; font-weight: bold; font-size: 18px;
            cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,114,255,0.4);
        }
        button:active { transform: scale(0.98); }

        .muro-item {
            background: rgba(255, 255, 255, 0.08); padding: 15px; border-radius: 15px;
            margin-bottom: 15px; border-left: 4px solid #00c6ff;
            animation: fadeIn 0.5s ease forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        
        .user-tag { color: #00c6ff; font-weight: bold; font-size: 14px; margin-bottom: 8px; display: block; }
        .msg-text { font-size: 15px; color: #e2e8f0; line-height: 1.6; }
        .msg-text a { color: #38bdf8; text-decoration: none; font-weight: bold; border-bottom: 1px dashed; }
        
        .btn-chat {
            display: inline-block; margin-top: 12px; padding: 8px 15px;
            background: rgba(255,255,255,0.1); color: #fff; text-decoration: none;
            border-radius: 8px; font-size: 13px; border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-chat:hover { background: #00c6ff; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; font-size: 24px;">🔄 FruitHunter Ultra</h1>
        <p style="margin:5px 0 0; opacity: 0.7; font-size: 14px;">Marketplace de Intercambios</p>
    </div>

    <div class="card-post">
        <input type="text" id="user" placeholder="👤 Tu @Usuario de Telegram">
        <textarea id="msg" rows="3" placeholder="🚀 ¿Qué quieres cambiar? Pega tus links aquí..."></textarea>
        <button onclick="enviar()">Publicar ahora</button>
    </div>

    <div id="muro"></div>

<script>
    // Tu conexión con FruitHunter
    const firebaseConfig = {
        databaseURL: "https://fruithunter-b5d2d-default-rtdb.firebaseio.com",
        projectId: "fruithunter-b5d2d",
        appId: "1:910354867578:web:30c5a30058c621116622c3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function linkify(text) {
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlRegex, (url) => `<a href="${url}" target="_blank">${url}</a>`);
    }

    function enviar() {
        const u = document.getElementById('user').value;
        const m = document.getElementById('msg').value;
        if(u && m) {
            db.ref('chats').push({ usuario: u, mensaje: m, t: Date.now() });
            document.getElementById('msg').value = "";
            alert("✅ ¡Publicado en la nube!");
        }
    }

    db.ref('chats').orderByChild('t').on('value', (snap) => {
        const div = document.getElementById('muro');
        div.innerHTML = "";
        snap.forEach((child) => {
            const v = child.val();
            const msgFinal = linkify(v.mensaje);
            div.innerHTML = `
                <div class="muro-item">
                    <span class="user-tag">@${v.usuario.replace('@','')}</span>
                    <div class="msg-text">${msgFinal}</div>
                    <a href="https://t.me/${v.usuario.replace('@','')}" class="btn-chat" target="_blank">💬 Mensaje Directo</a>
                </div>` + div.innerHTML;
        });
    });
</script>
</body>
</html>
