<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X Exchange PRO | Premium Network</title>
    
    <script src='//libtl.com/sdk.js' data-zone='10747271' data-sdk='show_10747271'></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;500;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --fb-blue: #1877F2; --bg-soft: #F0F2F5; --card-bg: #FFFFFF; --text-main: #1C1E21; --text-sub: #65676B; --accent: #31a24c; --gold: #f39c12; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-soft); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* OVERLAY DE BIENVENIDA PREMIUM */
        #lang-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .lang-card { background: #fff; padding: 40px; border-radius: 35px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.1); width: 90%; max-width: 400px; border: 1px solid #f0f2f5; }
        
        #app-content { display: none; flex-direction: column; height: 100vh; }
        
        /* HEADER EXCLUSIVO */
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); box-shadow: 0 4px 20px rgba(0,0,0,0.05); z-index: 100; border-bottom: 1px solid #f0f2f5; }
        .logo { font-family: 'Orbitron'; color: var(--fb-blue); font-size: 18px; letter-spacing: 3px; font-weight: 800; }
        .btn-guide { background: #000; border: none; color: #fff; padding: 10px 18px; border-radius: 14px; font-size: 10px; font-weight: 800; display: flex; align-items: center; gap: 8px; letter-spacing: 1px; }
        
        .online-status { font-size: 11px; color: #444; font-weight: 700; padding: 14px 20px; background: #fff; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; letter-spacing: 0.5px; }
        .dot { height: 8px; width: 8px; background-color: var(--accent); border-radius: 50%; display: inline-block; box-shadow: 0 0 10px var(--accent); }

        /* CATEGORÍAS */
        .cat-wrapper { background: #fff; border-bottom: 1px solid #eee; overflow-x: auto; scrollbar-width: none; }
        .categories { display: flex; gap: 10px; padding: 15px 20px; }
        .cat-btn { background: #f5f6f7; border: none; color: var(--text-sub); padding: 12px 20px; border-radius: 16px; font-size: 12px; font-weight: 700; transition: 0.3s; white-space: nowrap; }
        .cat-btn.active { background: var(--fb-blue); color: #fff; box-shadow: 0 4px 12px rgba(24, 119, 242, 0.3); }

        /* FEED Y TARJETAS */
        .feed { flex: 1; overflow-y: auto; padding: 20px 15px 120px; }
        .card { background: var(--card-bg); border-radius: 28px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02); position: relative; }
        .card-title { font-weight: 700; font-size: 16px; margin-bottom: 20px; color: #050505; line-height: 1.5; }
        
        /* BOTONES DE ACCIÓN */
        .btn-main { background: #000; color: #fff; border: none; padding: 18px; width: 100%; border-radius: 20px; font-weight: 800; font-size: 13px; letter-spacing: 1px; transition: 0.2s; }
        .btn-main:active { transform: scale(0.97); opacity: 0.9; }

        /* LIKES REALES */
        .reactions-bar { display: flex; align-items: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid #f5f6f7; }
        .like-btn { background: none; border: none; color: #65676B; display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
        .like-btn.active i { color: #e41e3f; animation: heartBeat 0.3s ease-in-out; }
        .like-btn.active { color: #000; }
        @keyframes heartBeat { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

        /* PLUS BUTTON */
        .btn-plus { position: fixed; bottom: 35px; right: 25px; background: var(--fb-blue); color: #fff; width: 70px; height: 70px; border-radius: 24px; font-size: 24px; display: flex; align-items: center; justify-content: center; z-index: 100; box-shadow: 0 15px 35px rgba(24, 119, 242, 0.4); border: none; }

        /* MODALES */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; backdrop-filter: blur(10px); }
        .modal-box { background: #fff; width: 100%; max-width: 400px; padding: 35px; border-radius: 40px; }
        .g-step { background: #f8f9fa; padding: 20px; border-radius: 22px; margin-bottom: 15px; border: 1px solid #eee; }
        .g-step h4 { font-size: 13px; font-weight: 800; margin-bottom: 8px; color: #000; }
        .g-step p { font-size: 12px; color: #666; line-height: 1.6; }

        #toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 15px 30px; border-radius: 50px; font-size: 12px; font-weight: 700; display: none; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; width: 85%; }
    </style>
</head>
<body>

    <div id="lang-overlay">
        <div class="lang-card">
            <h2 style="font-family:'Orbitron'; color:var(--fb-blue); margin-bottom:10px; letter-spacing:2px;">X EXCHANGE</h2>
            <p id="welcome-msg" style="color:#666; margin-bottom:30px; font-weight:600; font-size:13px; line-height:1.5;">Bienvenido a la red exclusiva de intercambios cripto.</p>
            <button class="btn-main" style="margin-bottom: 15px; background:var(--fb-blue);" onclick="iniciarApp('es')">ESPAÑOL</button>
            <button class="btn-main" style="background:#f0f2f5; color:#000;" onclick="iniciarApp('en')">ENGLISH</button>
        </div>
    </div>

    <div id="app-content">
        <div id="toast"></div>
        <div class="header">
            <div class="logo">X EXCHANGE</div>
            <button class="btn-guide" onclick="openGuide()">
                <i class="fas fa-shield-alt"></i> <span id="tr-guide-btn">ESTÁNDARES</span>
            </button>
        </div>
        
        <div class="online-status">
            <span class="dot"></span> <span id="tr-online-text">COMUNIDAD ACTIVA AHORA</span>: <span id="online-count">2,450</span>
        </div>

        <div class="cat-wrapper">
            <div class="categories">
                <button class="cat-btn active" id="btn-EX" onclick="filterCat('INTERCAMBIO', this)"><span id="tr-cat-ex">Intercambios</span> <span id="n-EX" class="badge"></span></button>
                <button class="cat-btn" id="btn-BO" onclick="filterCat('BOTS', this)"><span id="tr-cat-bo">Bots</span> <span id="n-BO" class="badge"></span></button>
                <button class="cat-btn" id="btn-CA" onclick="filterCat('CANALES', this)"><span id="tr-cat-ca">Canales</span> <span id="n-CA" class="badge"></span></button>
            </div>
        </div>

        <div id="main-feed" class="feed"></div>
        
        <button class="btn-plus" onclick="openPublish()"><i class="fas fa-plus"></i></button>

        <div id="modal-pub" class="modal">
            <div class="modal-box">
                <h3 id="tr-p-h" style="text-align:center; color:#000; margin-bottom:25px; font-weight:800; letter-spacing:-0.5px;">NUEVA PUBLICACIÓN</h3>
                <div id="form-content"></div>
                <button class="btn-main" id="tr-p-b" onclick="publicar()" style="background:var(--fb-blue);">REGISTRAR AHORA</button>
                <button onclick="closeModal('modal-pub')" id="tr-cancel" style="width:100%; margin-top:18px; border:none; background:none; color:gray; font-weight:700; font-size:12px;">CERRAR VENTANA</button>
            </div>
        </div>

        <div id="modal-guide" class="modal">
            <div class="modal-box">
                <h3 id="tr-g-h" style="text-align:center; color:#000; margin-bottom:25px; font-weight:800;">PROTOCOLO DE RED</h3>
                <div id="guide-steps"></div>
                <button class="btn-main" onclick="closeModal('modal-guide')" id="tr-g-b">ENTENDIDO</button>
            </div>
        </div>
    </div>

<script>
const firebaseConfig = { apiKey: "AIzaSyC5ObLcwYBLrwVU2ZNqCnBDgarTa88DFJE", authDomain: "fruithunter-b5d2d.firebaseapp.com", databaseURL: "https://fruithunter-b5d2d-default-rtdb.firebaseio.com", projectId: "fruithunter-b5d2d", storageBucket: "fruithunter-b5d2d.appspot.com", messagingSenderId: "910354867578", appId: "1:910354867578:web:30c5a30058c621116622c3" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentLang = 'es'; 
let activeCat = 'INTERCAMBIO';
let pressTimer;

const langData = {
    es: {
        welcome: "🌍 Idioma configurado: ESPAÑOL.\n\nBienvenido a X Exchange. Tu anuncio tendrá una vigencia exclusiva de 24 horas para garantizar una red limpia y actualizada.",
        guideBtn: "ESTÁNDARES", online: "COMUNIDAD ACTIVA AHORA", 
        pubH: "REGISTRO DE ANUNCIO", pubB: "CONFIRMAR PUBLICACIÓN", cancel: "DESCARTAR",
        view: "🔗 ACCEDER AL PROYECTO", viewEx: "🤝 NEGOCIAR AHORA", 
        empty: "📭 No hay publicaciones activas. Aprovecha la oportunidad de ser el primero.",
        ok: "✅ Transacción registrada. Tu anuncio ya está visible para toda la comunidad.",
        expire: "⏰ Este anuncio ha cumplido su ciclo de 24 horas.\n💡 Publica nuevamente para mantener tu negocio activo.",
        gM1: "🎯 REGLA #1: INTERCAMBIOS", gD1: "Solo texto y tu @usuario de Telegram. Nada de links. La confianza se gana con transparencia.",
        gM2: "📈 REGLA #2: BOTS Y CANALES", gD2: "Tu link va aquí. Asegúrate de que sea el correcto para llegar a tu audiencia ideal.",
        gM3: "⏳ REGLA #3: CADA 24 HORAS", gD3: "Los anuncios se renuevan automáticamente. Publica todos los días para mantenerte en la cima."
    },
    en: {
        welcome: "🌍 Language set to: ENGLISH.\n\nWelcome to X Exchange. Your post will remain active for 24 hours to ensure a high-quality, updated network.",
        guideBtn: "STANDARDS", online: "ACTIVE COMMUNITY NOW", 
        pubH: "AD REGISTRATION", pubB: "CONFIRM PUBLICATION", cancel: "DISCARD",
        view: "🔗 ACCESS PROJECT", viewEx: "🤝 NEGOTIATE NOW", 
        empty: "📭 No active posts. Take the chance to be the first one.",
        ok: "✅ Transaction recorded. Your ad is now visible to the entire community.",
        expire: "⏰ This ad has reached its 24-hour limit.\n💡 Post again to keep your business active.",
        gM1: "🎯 RULE #1: EXCHANGES", gD1: "Text and @username only. No links allowed. Trust is built through transparency.",
        gM2: "📈 RULE #2: BOTS & CHANNELS", gD2: "Your link goes here. Ensure it's correct to reach your ideal audience.",
        gM3: "⏳ RULE #3: EVERY 24 HOURS", gD3: "Ads renew automatically. Post daily to stay at the top of the feed."
    }
};

function iniciarApp(lang) {
    currentLang = lang;
    document.getElementById('lang-overlay').style.display = 'none';
    document.getElementById('app-content').style.display = 'flex';
    notify(langData[lang].welcome);
    
    const t = langData[lang];
    document.getElementById('tr-guide-btn').innerText = t.guideBtn;
    document.getElementById('tr-online-text').innerText = t.online;
    document.getElementById('tr-p-h').innerText = t.pubH;
    document.getElementById('tr-p-b').innerText = t.pubB;
    document.getElementById('tr-cancel').innerText = t.cancel;
    loadData();
}

function notify(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 5000);
}

function loadData(category = activeCat) {
    activeCat = category;
    const ahora = Date.now();
    db.ref('posts').on('value', snap => {
        let items = [];
        snap.forEach(child => {
            const p = child.val();
            if (ahora - p.time > 86400000) {
                db.ref('posts').child(child.key).remove();
                // Notificar expiración solo si es el dueño (basado en localstorage simple)
                if(localStorage.getItem('my_post') === child.key) notify(langData[currentLang].expire);
                return;
            }
            if(p.category === category) items.push({ key: child.key, ...p });
        });
        
        items.sort((a, b) => b.time - a.time);
        let html = "";
        items.forEach(p => {
            const hasLiked = localStorage.getItem('like_' + p.key);
            html += `<div class="card">
                <div class="card-title" onmousedown="startPress('${p.key}')" onmouseup="endPress()" ontouchstart="startPress('${p.key}')" ontouchend="endPress()">
                    ${p.category === 'INTERCAMBIO' ? p.desc : p.title}
                </div>
                <button class="btn-main" onclick="accion('${p.key}', '${p.category === 'INTERCAMBIO'}', '${p.link||''}', '${p.desc||''}', '${p.user||''}')">
                    ${p.category === 'INTERCAMBIO' ? langData[currentLang].viewEx : langData[currentLang].view}
                </button>
                <div class="reactions-bar">
                    <button class="like-btn ${hasLiked ? 'active' : ''}" onclick="toggleLike('${p.key}')">
                        <i class="${hasLiked ? 'fas' : 'far'} fa-heart"></i> <span>${p.likes || 0}</span>
                    </button>
                    <span style="margin-left:auto; font-size:10px; color:#bbb; font-weight:800;">
                        <i class="fas fa-history"></i> 24H ACTIVE
                    </span>
                </div>
            </div>`;
        });
        document.getElementById('main-feed').innerHTML = html || `<p style="text-align:center; padding:50px; color:#aaa; font-weight:600;">${langData[currentLang].empty}</p>`;
    });
}

function toggleLike(postId) {
    const key = 'like_' + postId;
    const hasLiked = localStorage.getItem(key);
    
    if (!hasLiked) {
        db.ref('posts').child(postId).child('likes').transaction(l => (l || 0) + 1);
        localStorage.setItem(key, 'true');
    } else {
        db.ref('posts').child(postId).child('likes').transaction(l => (l || 0) - 1);
        localStorage.removeItem(key);
    }
}

function openPublish() {
    const t = langData[currentLang];
    document.getElementById('form-content').innerHTML = activeCat === 'INTERCAMBIO' ? 
        `<textarea id="p-desc" maxlength="120" placeholder="Describe tu oferta de intercambio..." style="width:100%; padding:20px; border-radius:20px; border:1px solid #eee; margin-bottom:15px; height:100px; font-weight:600;"></textarea>
         <input type="text" id="p-user" placeholder="@TuUsuario" style="width:100%; padding:18px; border-radius:18px; border:1px solid #eee; margin-bottom:20px; font-weight:700;">` : 
        `<input type="text" id="p-title" maxlength="30" placeholder="Nombre del Bot o Canal" style="width:100%; padding:18px; border-radius:18px; border:1px solid #eee; margin-bottom:15px; font-weight:700;">
         <input type="text" id="p-link" placeholder="t.me/enlace_oficial" style="width:100%; padding:18px; border-radius:18px; border:1px solid #eee; margin-bottom:20px; font-weight:600;">`;
    document.getElementById('modal-pub').style.display = 'flex';
}

function publicar() {
    let data = { category: activeCat, time: Date.now(), likes: 0 };
    if (activeCat === 'INTERCAMBIO') {
        data.desc = document.getElementById('p-desc').value.trim();
        data.user = document.getElementById('p-user').value.trim();
        if(!data.desc || !data.user) return;
    } else {
        data.title = document.getElementById('p-title').value.trim();
        data.link = document.getElementById('p-link').value.trim();
        if(!data.title || !data.link) return;
    }
    
    if(typeof show_10747271 === 'function') show_10747271();
    const newPostRef = db.ref('posts').push(data);
    localStorage.setItem('my_post', newPostRef.key);
    notify(langData[currentLang].ok);
    closeModal('modal-pub');
}

function accion(postId, isEx, link, desc, user) {
    if (isEx === 'true') {
        window.open(`https://t.me/${user.replace('@', '')}`, '_blank');
    } else {
        window.open(link.startsWith('http') ? link : 'https://' + link, '_blank');
    }
}

function openGuide() {
    const t = langData[currentLang];
    document.getElementById('guide-steps').innerHTML = `<div class="g-step"><h4>${t.gM1}</h4><p>${t.gD1}</p></div><div class="g-step"><h4>${t.gM2}</h4><p>${t.gD2}</p></div><div class="g-step"><h4>${t.gM3}</h4><p>${t.gD3}</p></div>`;
    document.getElementById('modal-guide').style.display = 'flex';
}

function filterCat(cat, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); loadData(cat);
}

function closeModal(id) { document.getElementById(id).style.display = 'none'; }

function startPress(id) { pressTimer = setTimeout(() => { if(prompt("ACCESS:") === "231606") db.ref('posts').child(id).remove(); }, 5000); }
function endPress() { clearTimeout(pressTimer); }

setInterval(() => {
    document.getElementById('online-count').innerText = (2800 + Math.floor(Math.random()*50)).toLocaleString();
}, 5000);
</script>
</body>
</html>
