<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xchange Elite</title>
    
    <script src='//libtl.com/sdk.js' data-zone='10278425' data-sdk='show_10278425'></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://adsgram.ai/sdk.js"></script>

    <style>
        :root { --bg: #000; --card: #111; --accent: #24a1de; --text: #fff; --border: rgba(255,255,255,0.1); }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 15px; margin: 0; padding-bottom: 80px; }
        
        /* Contenedor de las burbujas */
        #muro-elite { margin-top: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .post-card { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 15px; 
            padding: 15px; 
            animation: fadeIn 0.4s ease;
        }
        
        .user-tag { color: var(--accent); font-weight: bold; font-size: 14px; }
        .activity-pill { background: #222; padding: 3px 8px; border-radius: 5px; font-size: 10px; color: #888; float: right; }
        .post-content { margin: 10px 0; font-size: 15px; line-height: 1.4; }
        
        .form-section { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); }
        input, textarea { width: 100%; background: #1c1c1e; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 10px; outline: none; }
        .btn-main { background: var(--accent); color: #fff; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        .btn-contact { background: #fff; color: #000; text-decoration: none; padding: 8px 15px; border-radius: 8px; font-size: 12px; font-weight: bold; display: inline-block; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="form-section">
        <input type="text" id="user-id" placeholder="@tu_usuario">
        <input type="text" id="activity-tag" placeholder="¿Qué buscas? (Ej: Registro)">
        <textarea id="trade-msg" rows="3" placeholder="Tu propuesta..."></textarea>
        <button class="btn-main" onclick="publishTrade()">PUBLICAR Y VER ANUNCIO</button>
    </div>

    <div id="muro-elite"></div>

    <script>
        // FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAs-7N0P0E1_zR8XqW2M6V5Y4T3L1_v0U9", 
            databaseURL: "https://fruithunter-b5d2d-default-rtdb.firebaseio.com",
            projectId: "fruithunter-b5d2d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ADSGRAM - Precarga para que no falle
        const AdController = window.Adsgram ? window.Adsgram.init({ blockId: "18897" }) : null;

        function publishTrade() {
            const u = document.getElementById('user-id').value;
            const tag = document.getElementById('activity-tag').value;
            const msg = document.getElementById('trade-msg').value;

            if(!u || !tag || !msg) return alert("Rellena todo");

            // Guardar en Firebase
            db.ref('elite_trades_v2').push({
                u, tag, msg, t: Date.now(), plat: 'tg'
            }).then(() => {
                document.getElementById('trade-msg').value = "";
                // DISPARAR ANUNCIO AL PUBLICAR
                if(AdController) {
                    AdController.show().catch(() => {});
                }
            });
        }

        // CARGAR BURBUJAS (GRUPOS)
        db.ref('elite_trades_v2').orderByChild('t').on('value', (snap) => {
            const container = document.getElementById('muro-elite');
            container.innerHTML = "";
            let posts = [];
            snap.forEach(child => { posts.push(child.val()); });
            
            posts.reverse().forEach(post => {
                container.innerHTML += `
                    <div class="post-card">
                        <span class="user-tag">${post.u}</span>
                        <span class="activity-pill">${post.tag}</span>
                        <div class="post-content">${post.msg}</div>
                        <a href="https://t.me/${post.u.replace('@','')}" class="btn-contact">CONTACTAR</a>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
