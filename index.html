<html lang="es">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --fb-blue: #1877F2; --bg-soft: #F0F2F5; --card-bg: #FFFFFF; --text-main: #1C1E21; --text-sub: #65676B; --accent: #31a24c; --gold: #f39c12; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-soft); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        #lang-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .lang-card { background: #f8f9fa; padding: 30px; border-radius: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 85%; max-width: 350px; }
        #app-content { display: none; flex-direction: column; height: 100vh; }
        .header { padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); box-shadow: 0 4px 15px rgba(0,0,0,0.06); z-index: 100; }
        .logo { font-family: 'Orbitron'; color: var(--fb-blue); font-size: 20px; letter-spacing: 2px; font-weight: 800; }
        .header-btns { display: flex; gap: 5px; }
        .btn-guide { background: linear-gradient(135deg, var(--fb-blue), #0056b3); border: none; color: #fff; padding: 10px 14px; border-radius: 12px; font-size: 11px; font-weight: 800; display: flex; align-items: center; gap: 5px; }
        .online-status { font-size: 11px; color: var(--accent); font-weight: 800; padding: 12px 20px; background: #fff; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; }
        .dot { height: 10px; width: 10px; background-color: var(--accent); border-radius: 50%; display: inline-block; animation: blink 1.2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .cat-wrapper { background: #fff; border-bottom: 1px solid #eee; }
        .categories { display: flex; gap: 8px; overflow-x: auto; padding: 12px; scrollbar-width: none; justify-content: flex-start; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn { background: #f0f2f5; border: none; color: var(--text-sub); padding: 10px 15px; border-radius: 15px; font-size: 12px; white-space: nowrap; font-weight: 700; transition: 0.3s; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
        .cat-btn.active { background: #fff; color: var(--fb-blue); border: 2px solid var(--fb-blue); padding: 8px 13px; }
        .feed { flex: 1; overflow-y: auto; padding: 20px 15px; padding-bottom: 100px; }
        
        /* ESTILOS DE TARJETAS Y FORO */
        .card { background: var(--card-bg); border-radius: 24px; padding: 22px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.04); border-left: 5px solid var(--fb-blue); position: relative; }
        .card.featured { border-left-color: var(--gold); background: #fffdf5; border-right: 1px solid var(--gold); }
        .card-title { font-weight: 700; font-size: 15px; margin-bottom: 18px; color: #111; word-wrap: break-word; }
        .forum-text { font-size: 13px; color: #444; line-height: 1.6; margin-bottom: 15px; white-space: pre-wrap; }
        .reactions { display: flex; gap: 10px; margin-top: 15px; border-top: 1px solid #f0f2f5; padding-top: 10px; }
        .react-btn { border: none; background: #f0f2f5; padding: 5px 10px; border-radius: 10px; font-size: 12px; font-weight: 600; cursor: pointer; }
        
        .card-meta { display: flex; justify-content: space-between; margin-top: 15px; font-size: 12px; color: var(--text-sub); font-weight: 600; border-top: 1px solid #f8f9fa; padding-top: 12px; }
        .btn-main { background: linear-gradient(135deg, #111, #333); color: #fff; border: none; padding: 16px; width: 100%; border-radius: 18px; font-weight: 800; font-size: 13px; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; backdrop-filter: blur(8px); }
        .modal-box { background: #fff; width: 100%; max-width: 420px; padding: 30px; border-radius: 35px; max-height: 90vh; overflow-y: auto; }
        .btn-plus { position: fixed; bottom: 30px; right: 25px; background: #000; color: #fff; width: 70px; height: 70px; border-radius: 50%; font-size: 24px; display: flex; align-items: center; justify-content: center; z-index: 100; border: 6px solid #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        #toast { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 12px 25px; border-radius: 20px; font-size: 12px; font-weight: 700; display: none; z-index: 2000; }
        .badge { background: #d93025; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-left: 5px; display: none; }
        .badge.show { display: inline-block; }
    </style>
</head>
<body>
    <div id="lang-overlay">
        <div class="lang-card">
            <h2 style="font-family:'Orbitron'; color:var(--fb-blue); margin-bottom:10px;">X EXCHANGE</h2>
            <p style="color:gray; margin-bottom:30px; font-weight:700; font-size:12px;">SELECT LANGUAGE</p>
            <button class="btn-main" style="margin-bottom: 15px;" onclick="iniciarApp('es')">ESPAÑOL</button>
            <button class="btn-main" style="background:#fff; color:#000; border:2px solid #000;" onclick="iniciarApp('en')">ENGLISH</button>
        </div>
    </div>

    <div id="app-content">
        <div id="toast"></div>
        <div class="header">
            <div class="logo">X EXCHANGE</div>
            <div class="header-btns">
                <button class="btn-guide" onclick="compartirApp()" style="background:#000;"><i class="fas fa-share-alt"></i></button>
                <button class="btn-guide" onclick="openGuide()"><i class="fas fa-crown"></i> <span id="tr-guide-btn">MANUAL</span></button>
            </div>
        </div>
        <div class="online-status">
            <span class="dot"></span> <span id="tr-online-text">USUARIOS EN LÍNEA</span>: <span id="online-count">2,450</span>
        </div>
        <div class="cat-wrapper">
            <div class="categories">
                <button class="cat-btn active" id="btn-EX" onclick="filterCat('INTERCAMBIO', this)"><i class="fas fa-handshake"></i> <span id="tr-cat-ex">Intercambios</span> <span id="n-EX" class="badge"></span></button>
                <button class="cat-btn" id="btn-BO" onclick="filterCat('BOTS', this)"><i class="fas fa-robot"></i> <span id="tr-cat-bo">Bots</span> <span id="n-BO" class="badge"></span></button>
                <button class="cat-btn" id="btn-CA" onclick="filterCat('CANALES', this)"><i class="fas fa-bullhorn"></i> <span id="tr-cat-ca">Canales</span> <span id="n-CA" class="badge"></span></button>
                <button class="cat-btn" id="btn-GR" onclick="filterCat('GRUPOS', this)"><i class="fas fa-users"></i> <span id="tr-cat-gr">Grupos</span> <span id="n-GR" class="badge"></span></button>
                <button class="cat-btn" id="btn-CO" onclick="filterCat('COMUNIDAD', this)"><i class="fas fa-comments"></i> <span>Comunidad</span> <span id="n-CO" class="badge"></span></button>
            </div>
        </div>
        <div id="main-feed" class="feed"></div>
        <button class="btn-plus" onclick="openPublish()"><i class="fas fa-plus"></i></button>

        <div id="modal-pub" class="modal">
            <div class="modal-box">
                <h3 id="tr-p-h" style="text-align:center; color:var(--fb-blue); margin-bottom:25px; font-weight:800;"></h3>
                <div id="form-content"></div>
                <button class="btn-main" id="tr-p-b" onclick="publicar()"></button>
                <button onclick="closeModal('modal-pub')" id="tr-cancel" style="width:100%; margin-top:18px; border:none; background:none; color:gray; font-weight:800; font-size:12px;"></button>
            </div>
        </div>

        <div id="modal-guide" class="modal">
            <div class="modal-box"><h3 id="tr-g-h" style="text-align:center; color:var(--fb-blue); margin-bottom:20px; font-weight:800;"></h3><div id="guide-steps"></div><button class="btn-main" onclick="closeModal('modal-guide')" id="tr-g-b"></button></div>
        </div>
    </div>

<script>
const firebaseConfig = { apiKey: "AIzaSyC5ObLcwYBLrwVU2ZNqCnBDgarTa88DFJE", authDomain: "fruithunter-b5d2d.firebaseapp.com", databaseURL: "https://fruithunter-b5d2d-default-rtdb.firebaseio.com", projectId: "fruithunter-b5d2d", storageBucket: "fruithunter-b5d2d.appspot.com", messagingSenderId: "910354867578", appId: "1:910354867578:web:30c5a30058c621116622c3" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentLang = 'es'; let activeCat = 'INTERCAMBIO'; let clickCount = 0; let pressTimer;

const langData = {
    es: { guideBtn: "MANUAL", online: "USUARIOS EN LÍNEA", catEx: "Exchanges", catBo: "Bots", catCa: "Canales", catGr: "Grupos", pubH: "NUEVO POST", pubB: "¡PUBLICAR!", cancel: "CANCELAR", view: "VER PROYECTO", viewEx: "NEGOCIAR", empty: "Sin ofertas.", ok: "🚀 ¡Publicado!", phManual: "Venta USDT...", phUser: "@Usuario", phTitle: "Título", phLink: "Link", phLong: "Escribe aquí tu post largo para la comunidad..." },
    en: { guideBtn: "MANUAL", online: "ONLINE", catEx: "Exchanges", catBo: "Bots", catCa: "Channels", catGr: "Groups", pubH: "NEW POST", pubB: "PUBLISH", cancel: "CANCEL", view: "VIEW", viewEx: "TRADE", empty: "Empty.", ok: "🚀 Published!", phManual: "Selling...", phUser: "@User", phTitle: "Title", phLink: "Link", phLong: "Write your long post here..." }
};

function iniciarApp(lang) {
    currentLang = lang; document.getElementById('lang-overlay').style.display = 'none'; document.getElementById('app-content').style.display = 'flex';
    const t = langData[lang];
    document.getElementById('tr-guide-btn').innerText = t.guideBtn; document.getElementById('tr-online-text').innerText = t.online;
    document.getElementById('tr-cat-ex').innerText = t.catEx; document.getElementById('tr-cat-bo').innerText = t.catBo;
    document.getElementById('tr-cat-ca').innerText = t.catCa; document.getElementById('tr-cat-gr').innerText = t.catGr;
    document.getElementById('tr-p-h').innerText = t.pubH; document.getElementById('tr-p-b').innerText = t.pubB;
    document.getElementById('tr-cancel').innerText = t.cancel; loadData();
}

function notify(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }

function loadData(category = activeCat) {
    activeCat = category; const ahora = Date.now();
    db.ref('posts').on('value', snap => {
        let items = []; let counts = { INTERCAMBIO: 0, BOTS: 0, CANALES: 0, GRUPOS: 0, COMUNIDAD: 0 };
        snap.forEach(child => {
            const p = child.val();
            if (ahora - (p.time || 0) > 86400000) { db.ref('posts').child(child.key).remove(); return; }
            if(counts[p.category] !== undefined) counts[p.category]++;
            if(p.category === category) items.push({ key: child.key, ...p });
        });
        // 4. ORDENAR: DESTACADOS PRIMERO, LUEGO POR TIEMPO
        items.sort((a, b) => (b.featured || 0) - (a.featured || 0) || b.time - a.time);
        let html = "";
        items.forEach(p => {
            const isEx = p.category === 'INTERCAMBIO';
            const isCo = p.category === 'COMUNIDAD';
            html += `<div class="card ${p.featured ? 'featured' : ''}">
                ${p.featured ? '<span style="position:absolute; top:10px; right:15px; font-size:10px; color:var(--gold); font-weight:800;"><i class="fas fa-star"></i> DESTACADO</span>' : ''}
                <div class="card-title">${isEx ? p.desc : p.title}</div>
                ${isCo ? `<div class="forum-text">${p.longText}</div>` : ''}
                ${!isCo ? `<button class="btn-main" onclick="accion('${p.key}', '${isEx}', '${p.link||''}', '${p.desc||''}', '${p.user||''}')">${isEx ? langData[currentLang].viewEx : langData[currentLang].view}</button>` : ''}
                <div class="card-meta"><span><i class="fas fa-bolt"></i> ${p.views || 0}</span> <span>${p.featured ? 'PRO' : 'FREE'}</span></div>
                ${isCo ? `<div class="reactions">
                    <button class="react-btn" onclick="react('${p.key}','👍')">👍 ${p.r1||0}</button>
                    <button class="react-btn" onclick="react('${p.key}','🔥')">🔥 ${p.r2||0}</button>
                    <button class="react-btn" onclick="react('${p.key}','💎')">💎 ${p.r3||0}</button>
                </div>` : ''}
            </div>`;
        });
        document.getElementById('main-feed').innerHTML = html || `<p style="text-align:center; padding:50px;">${langData[currentLang].empty}</p>`;
        updateBadges(counts);
    });
}

function openPublish() {
    const t = langData[currentLang];
    let content = "";
    if (activeCat === 'COMUNIDAD') {
        content = `<input type="text" id="p-title" placeholder="${t.phTitle}" style="width:100%; padding:15px; border-radius:15px; border:1px solid #eee; margin-bottom:10px;">
                   <textarea id="p-long" maxlength="2000" placeholder="${t.phLong}" style="width:100%; padding:15px; border-radius:15px; border:1px solid #eee; height:150px;"></textarea>`;
    } else {
        content = activeCat === 'INTERCAMBIO' ? 
        `<textarea id="p-desc" maxlength="120" placeholder="${t.phManual}" style="width:100%; padding:15px; border-radius:15px; border:1px solid #eee; margin-bottom:10px;"></textarea>
         <input type="text" id="p-user" placeholder="${t.phUser}" style="width:100%; padding:15px; border-radius:15px; border:1px solid #eee;">` : 
        `<input type="text" id="p-title" placeholder="${t.phTitle}" style="width:100%; padding:15px; border-radius:15px; border:1px solid #eee; margin-bottom:10px;">
         <input type="text" id="p-link" placeholder="${t.phLink}" style="width:100%; padding:15px; border-radius:15px; border:1px solid #eee;">`;
    }
    document.getElementById('form-content').innerHTML = content + `<div style="margin-top:10px; font-size:11px; color:var(--gold); font-weight:700;"><i class="fas fa-ad"></i> Destaca tu anuncio viendo un video al publicar.</div>`;
    document.getElementById('modal-pub').style.display = 'flex';
}

function publicar() {
    // 4. SISTEMA DESTACAR POR ADS
    if(typeof show_10747271 === 'function') show_10747271();
    
    let data = { category: activeCat, time: Date.now(), views: 0, featured: 1 }; // Le damos featured 1 por ver el ad
    if(activeCat === 'COMUNIDAD') {
        data.title = document.getElementById('p-title').value;
        data.longText = document.getElementById('p-long').value;
        data.r1 = 0; data.r2 = 0; data.r3 = 0;
    } else if (activeCat === 'INTERCAMBIO') {
        data.desc = document.getElementById('p-desc').value;
        data.user = document.getElementById('p-user').value;
    } else {
        data.title = document.getElementById('p-title').value;
        data.link = document.getElementById('p-link').value;
    }
    db.ref('posts').push(data).then(() => { notify(langData[currentLang].ok); closeModal('modal-pub'); });
}

function react(key, emoji) {
    let field = emoji === '👍' ? 'r1' : emoji === '🔥' ? 'r2' : 'r3';
    db.ref('posts').child(key).child(field).transaction(c => (c || 0) + 1);
}

function compartirApp() {
    if (navigator.share) {
        navigator.share({ title: 'X Exchange PRO', text: 'Cambia USDT y proyectos cripto aquí:', url: window.location.href });
    } else { notify("Enlace copiado."); navigator.clipboard.writeText(window.location.href); }
}

function accion(id, isEx, link, desc, user) {
    db.ref('posts').child(id).child('views').transaction(c => (c || 0) + 1);
    if(isEx === 'true') window.open(`https://t.me/${user.replace('@','')}`);
    else window.open(link.startsWith('http') ? link : 'https://' + link);
}

function updateBadges(c) {
    const ids = { INTERCAMBIO: 'n-EX', BOTS: 'n-BO', CANALES: 'n-CA', GRUPOS: 'n-GR', COMUNIDAD: 'n-CO' };
    for (let cat in ids) { const b = document.getElementById(ids[cat]); if(b) { b.innerText = c[cat]; b.className = c[cat] > 0 ? "badge show" : "badge"; } }
}

function filterCat(cat, btn) { document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); loadData(cat); }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }
function openGuide() { notify("Anuncios activos por 24h."); }
setInterval(() => { const el = document.getElementById('online-count'); if(el) el.innerText = (2400 + Math.floor(Math.random()*80)).toLocaleString(); }, 4000);
</script>
</body>
</html>
