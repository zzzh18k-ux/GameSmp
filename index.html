<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GVS Store | Professional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- El SDK se mantiene para la carga de anuncios -->
    <script src='//libtl.com/sdk.js' data-zone='10747271' data-sdk='show_10747271'></script>
    <style>
        /* (Se mantienen estilos base para estética profesional) */
        body { background: #0D1117; color: #fff; font-family: sans-serif; padding-bottom: 100px; }
        .app { max-width: 480px; margin: 0 auto; }
        .btn-withdraw { 
            background: #FFD966; color: #000; padding: 15px; width: 100%; 
            border: none; border-radius: 20px; font-weight: bold; margin-top: 20px; cursor: pointer;
        }
        .task-reward { color: #10B981; font-weight: 700; }
        /* ... resto de estilos ... */
    </style>
</head>
<body>

<div class="app">
    <!-- Header -->
    <div class="header">
        <div class="logo">GVS STORE</div>
    </div>

    <!-- Balance -->
    <div class="balance-card">
        <div class="balance-label">SALDO</div>
        <div class="balance-value" id="balanceUSD">$0.00</div>
        <!-- Botón de retiro bloqueado -->
        <button class="btn-withdraw" onclick="intentarRetiro()">RETIRAR FONDOS</button>
    </div>

    <!-- Tareas ajustadas a 0.04$ -->
    <div class="tasks-container">
        <div class="task-item">
            <h4>Tarea Diaria</h4>
            <div class="task-reward" id="rewardValue">+$0.04</div>
            <button class="btn-task" onclick="completarTarea()">Completar</button>
        </div>
    </div>

    <!-- Referidos ajustados a 0.01$ -->
    <div class="referral-panel">
        <h3>Referidos</h3>
        <p>Recompensa por referido: <b>$0.01</b></p>
        <button onclick="simularReferido()">Invitar Amigo</button>
    </div>
</div>

<script>
    let balance = 0.00;

    // Tarea de 0.04$
    function completarTarea() {
        balance += 0.04;
        actualizarUI();
        alert("Tarea completada. Se han sumado $0.04 a tu saldo.");
    }

    // Referido de 0.01$
    function simularReferido() {
        balance += 0.01;
        actualizarUI();
        alert("Referido registrado. Has ganado $0.01");
    }

    // Bloqueo de retiros
    function intentarRetiro() {
        // Mensaje disimulado de error de sistema
        alert("Error de validación: El sistema de retiros se encuentra en mantenimiento técnico para actualizaciones de seguridad. Intente nuevamente en 48 horas.");
    }

    function actualizarUI() {
        document.getElementById('balanceUSD').innerText = "$" + balance.toFixed(2);
    }
</script>

</body>
</html>
