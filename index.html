<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X Exchange PRO</title>
    
    <script src='//libtl.com/sdk.js' data-zone='10747271' data-sdk='show_10747271'></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --fb-blue: #1877F2; --bg-soft: #F0F2F5; --card-bg: #FFFFFF; --text-main: #1C1E21; --text-sub: #65676B; --accent: #31a24c; --gold: #f39c12; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-soft); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Header Premium */
        .header { padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); box-shadow: 0 4px 15px rgba(0,0,0,0.06); z-index: 100; }
        .logo { font-family: 'Orbitron'; color: var(--fb-blue); font-size: 20px; letter-spacing: 2px; font-weight: 800; text-shadow: 2px 2px 4px rgba(24, 119, 242, 0.1); }
        .btn-guide { background: linear-gradient(135deg, var(--fb-blue), #0056b3); border: none; color: #fff; padding: 10px 16px; border-radius: 12px; font-size: 11px; font-weight: 800; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 12px rgba(24, 119, 242, 0.3); }

        .online-status { font-size: 11px; color: var(--accent); font-weight: 800; padding: 12px 20px; background: #fff; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; letter-spacing: 0.5px; }
        .dot { height: 10px; width: 10px; background-color: var(--accent); border-radius: 50%; display: inline-block; animation: blink 1.2s infinite; box-shadow: 0 0 8px var(--accent); }
        @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.2); } }

        /* Categorías con Aviso de Deslizar */
        .cat-wrapper { position: relative; background: #fff; border-bottom: 1px solid #eee; }
        .scroll-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--fb-blue); font-weight: 800; animation: bounceRight 1.5s infinite; pointer-events: none; background: rgba(255,255,255,0.8); padding: 5px; border-radius: 10px; z-index: 5; }
        @keyframes bounceRight { 0%, 100% { transform: translate(0, -50%); } 50% { transform: translate(5px, -50%); } }

        .categories { display: flex; gap: 12px; overflow-x: auto; padding: 15px; scrollbar-width: none; position: relative; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn { background: #f0f2f5; border: none; color: var(--text-sub); padding: 12px 22px; border-radius: 25px; font-size: 13px; white-space: nowrap; font-weight: 700; transition: 0.3s; display: flex; align-items: center; gap: 10px; border: 2px solid transparent; }
        .cat-btn i { font-size: 14px; }
        .cat-btn.active { background: #fff; color: var(--fb-blue); border-color: var(--fb-blue); box-shadow: 0 4px 12px rgba(24, 119, 242, 0.15); }

        /* Feed & Tarjetas Pro */
        .feed { flex: 1; overflow-y: auto; padding: 20px 15px; padding-bottom: 100px; }
        .card { background: var(--card-bg); border-radius: 24px; padding: 22px; margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.03); box-shadow: 0 10px 25px rgba(0,0,0,0.04); transition: 0.3s; position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 6px; height: 100%; background: var(--fb-blue); opacity: 0.8; }
        .card-title { font-weight: 700; font-size: 15px; margin-bottom: 18px; color: #111; line-height: 1.6; }
        .card-meta { display: flex; justify-content: space-between; margin-top: 15px; font-size: 12px; color: var(--text-sub); font-weight: 600; border-top: 1px solid #f8f9fa; padding-top: 12px; }

        .btn-main { background: linear-gradient(135deg, #111, #333); color: #fff; border: none; padding: 16px; width: 100%; border-radius: 18px; font-weight: 800; font-size: 13px; letter-spacing: 1px; transition: 0.3s; box-shadow: 0 6px 15px rgba(0,0,0,0.2); }
        .btn-main:active { transform: scale(0.96); }

        /* Modales */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; backdrop-filter: blur(8px); }
        .modal-box { background: #fff; width: 100%; max-width: 420px; padding: 30px; border-radius: 35px; max-height: 85vh; overflow-y: auto; position: relative; border: 1px solid rgba(255,255,255,0.2); }
        
        /* Manual Visual */
        .guide-step { display: flex; gap: 15px; margin-bottom: 20px; align-items: flex-start; background: #f8f9fa; padding: 15px; border-radius: 20px; }
        .guide-icon { background: var(--fb-blue); color: #fff; min-width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 4px 10px rgba(24, 119, 242, 0.3); }
        .guide-info h4 { font-size: 14px; font-weight: 800; color: #111; margin-bottom: 4px; }
        .guide-info p { font-size: 12px; color: var(--text-sub); line-height: 1.5; font-weight: 500; }

        /* Botón Plus Pro */
        .btn-plus { position: fixed; bottom: 30px; right: 25px; background: #000; color: #fff; width: 70px; height: 70px; border-radius: 50%; font-size: 24px; display: flex; align-items: center; justify-content: center; z-index: 100; border: 6px solid #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: 0.3s; }
        .btn-plus:active { transform: scale(0.85); }

        #lang-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .badge { background: #d93025; color: #fff; font-size: 10px; padding: 3px 8px; border-radius: 20px; margin-left: 6px; font-weight: 800; display: none; }
        .badge.show { display: inline-block; }
    </style>
</head>
<body>
    <div id="lang-overlay">
        <h2 style="font-family:'Orbitron'; color:var(--fb-blue); margin-bottom:10px;">X EXCHANGE</h2>
        <p style="color:gray; margin-bottom:30px; font-weight:700; font-size:12px;">SELECT YOUR PREFERRED LANGUAGE</p>
        <button class="cat-btn active" style="margin: 10px; width: 260px; padding: 18px;" onclick="setInitialLang('es')">ESPAÑOL</button>
        <button class="cat-btn active" style="margin: 10px; width: 260px; padding: 18px;" onclick="setInitialLang('en')">ENGLISH</button>
    </div>

    <div class="header">
        <div class="logo">X EXCHANGE</div>
        <button class="btn-guide" onclick="openGuide()">
            <i class="fas fa-crown"></i>
            <span id="tr-guide-btn">MANUAL</span>
        </button>
    </div>

    <div class="online-status">
        <span class="dot"></span> <span id="tr-online-text">USUARIOS EN LÍNEA</span>: <span id="online-count">2,450</span>
    </div>

    <div class="cat-wrapper">
        <div class="scroll-hint" id="tr-scroll">DESLIZA <i class="fas fa-arrow-right"></i></div>
        <div class="categories" id="cat-scroll">
            <button class="cat-btn active" id="btn-EX" onclick="filterCat('INTERCAMBIO', this)"><i class="fas fa-handshake"></i> <span id="tr-cat-ex">Intercambios</span> <span id="n-EX" class="badge"></span></button>
            <button class="cat-btn" id="btn-BO" onclick="filterCat('BOTS', this)"><i class="fas fa-robot"></i> <span id="tr-cat-bo">Bots</span> <span id="n-BO" class="badge"></span></button>
            <button class="cat-btn" id="btn-CA" onclick="filterCat('CANALES', this)"><i class="fas fa-bullhorn"></i> <span id="tr-cat-ca">Canales</span> <span id="n-CA" class="badge"></span></button>
            <button class="cat-btn" id="btn-GR" onclick="filterCat('GRUPOS', this)"><i class="fas fa-users"></i> <span id="tr-cat-gr">Grupos</span> <span id="n-GR" class="badge"></span></button>
        </div>
    </div>

    <div id="main-feed" class="feed"></div>

    <button class="btn-plus" onclick="openPublish()"><i class="fas fa-plus"></i></button>

    <div id="modal-pub" class="modal">
        <div class="modal-box">
            <h3 id="tr-p-h" style="text-align:center; color:var(--fb-blue); margin-bottom:25px; font-weight:800; letter-spacing:1px;"></h3>
            <div id="form-content"></div>
            <button class="btn-main" id="tr-p-b" onclick="publicar()"></button>
            <button onclick="closeModal('modal-pub')" id="tr-cancel" style="width:100%; margin-top:18px; border:none; background:none; color:gray; font-weight:800; font-size:12px; letter-spacing:1px;"></button>
        </div>
    </div>

    <div id="modal-guide" class="modal">
        <div class="modal-box">
            <h3 id="tr-g-h" style="text-align:center; color:var(--fb-blue); margin-bottom:30px; font-weight:800; font-family:'Orbitron';">👑 MANUAL PRO</h3>
            <div id="guide-steps"></div>
            <button class="btn-main" onclick="closeModal('modal-guide')" id="tr-g-b" style="margin-top:10px;"></button>
        </div>
    </div>

<script>
const firebaseConfig = { apiKey: "AIzaSyC5ObLcwYBLrwVU2ZNqCnBDgarTa88DFJE", authDomain: "fruithunter-b5d2d.firebaseapp.com", databaseURL: "https://fruithunter-b5d2d-default-rtdb.firebaseio.com", projectId: "fruithunter-b5d2d", storageBucket: "fruithunter-b5d2d.appspot.com", messagingSenderId: "910354867578", appId: "1:910354867578:web:30c5a30058c621116622c3" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const langData = {
    es: {
        guideBtn: "MANUAL", online: "USUARIOS EN LÍNEA", scroll: "DESLIZA",
        catEx: "Intercambios", catBo: "Bots", catCa: "Canales", catGr: "Grupos",
        pubH: "CREAR ANUNCIO TOP", pubB: "¡PUBLICAR AHORA!", cancel: "TAL VEZ LUEGO",
        view: "VER PROYECTO", viewEx: "NEGOCIAR AHORA", empty: "Sin ofertas. ¡Sé el primero!",
        phManual: "Describe tu oferta (Ej: Vendo 100 USDT...)", phUser: "@TuUsuarioTelegram", phTitle: "Nombre del Proyecto", phLink: "Pega el enlace aquí",
        gTitle: "👑 MANUAL PRO", gBtn: "¡LISTO, VAMOS!",
        g1T: "Negocios Directos", g1D: "En 'Intercambios' usa solo texto y tu @usuario. Los links aquí están prohibidos.",
        g2T: "Proyectos y Links", g2D: "Promociona tus Bots o Canales con links reales en sus categorías.",
        g3T: "Limpieza Total", g3D: "Cada anuncio dura 24 horas. Mantén la lista fresca y real."
    },
    en: {
        guideBtn: "MANUAL", online: "ONLINE USERS", scroll: "SCROLL",
        catEx: "Exchanges", catBo: "Bots", catCa: "Channels", catGr: "Groups",
        pubH: "CREATE TOP POST", pubB: "PUBLISH NOW!", cancel: "MAYBE LATER",
        view: "VIEW PROJECT", viewEx: "TRADE NOW", empty: "No offers yet. Be first!",
        phManual: "Describe your offer (Ex: Selling 100 USDT...)", phUser: "@YourTelegram", phTitle: "Project Name", phLink: "Paste link here",
        gTitle: "👑 PRO MANUAL", gBtn: "GOT IT, LET'S GO!",
        g1T: "Direct Business", g1D: "In 'Exchanges' use only text and your @username. No links allowed.",
        g2T: "Projects & Links", g2D: "Promote your Bots or Channels with real links in their categories.",
        g3T: "Total Cleanup", g3D: "Each post lasts 24 hours. Keep the list fresh and real."
    }
};

let currentLang = 'es'; let activeCat = 'INTERCAMBIO';

function setInitialLang(lang) {
    currentLang = lang; document.getElementById('lang-overlay').style.display = 'none';
    const t = langData[lang];
    document.getElementById('tr-guide-btn').innerText = t.guideBtn;
    document.getElementById('tr-online-text').innerText = t.online;
    document.getElementById('tr-scroll').innerHTML = `${t.scroll} <i class="fas fa-arrow-right"></i>`;
    document.getElementById('tr-cat-ex').innerText = t.catEx;
    document.getElementById('tr-cat-bo').innerText = t.catBo;
    document.getElementById('tr-cat-ca').innerText = t.catCa;
    document.getElementById('tr-cat-gr').innerText = t.catGr;
    document.getElementById('tr-p-h').innerText = t.pubH;
    document.getElementById('tr-p-b').innerText = t.pubB;
    document.getElementById('tr-cancel').innerText = t.cancel;
    document.getElementById('tr-g-h').innerText = t.gTitle;
    document.getElementById('tr-g-b').innerText = t.gBtn;
    loadData();
}

function loadData(category = activeCat) {
    activeCat = category;
    db.ref('posts').on('value', snap => {
        let html = ""; let counts = { INTERCAMBIO: 0, BOTS: 0, CANALES: 0, GRUPOS: 0 };
        snap.forEach(child => {
            const p = child.val(); counts[p.category]++;
            if(p.category === category) {
                const isEx = p.category === 'INTERCAMBIO';
                html += `<div class="card">
                    <div class="card-title">${isEx ? p.desc : p.title}</div>
                    <button class="btn-main" onclick="accion('${isEx}', '${p.link||''}', '${p.desc||''}', '${p.user||''}')">
                        <i class="fas ${isEx?'fa-comments':'fa-external-link-alt'}"></i> &nbsp; ${isEx ? langData[currentLang].viewEx : langData[currentLang].view}
                    </button>
                    <div class="card-meta">
                        <span><i class="fas fa-bolt" style="color:var(--gold)"></i> ${p.views || 0} views</span>
                        <span><i class="far fa-clock"></i> ACTIVE</span>
                    </div>
                </div>`;
            }
        });
        document.getElementById('main-feed').innerHTML = html || `<p style="text-align:center; padding:50px; color:gray; font-weight:700;">${langData[currentLang].empty}</p>`;
        updateBadges(counts);
    });
}

function updateBadges(c) {
    const ids = { INTERCAMBIO: 'n-EX', BOTS: 'n-BO', CANALES: 'n-CA', GRUPOS: 'n-GR' };
    for (let cat in ids) {
        const b = document.getElementById(ids[cat]);
        if(b) { b.innerText = c[cat]; b.className = c[cat] > 0 ? "badge show" : "badge"; }
    }
}

function openPublish() {
    const t = langData[currentLang];
    document.getElementById('form-content').innerHTML = activeCat === 'INTERCAMBIO' ? 
        `<textarea id="p-desc" placeholder="${t.phManual}" maxlength="120" rows="3"></textarea>
         <input type="text" id="p-user" placeholder="${t.phUser}" maxlength="30">` : 
        `<input type="text" id="p-title" placeholder="${t.phTitle}" maxlength="60">
         <input type="text" id="p-link" placeholder="${t.phLink}">`;
    document.getElementById('modal-pub').style.display = 'flex';
}

function publicar() {
    const desc = document.getElementById('p-desc')?.value.trim();
    const user = document.getElementById('p-user')?.value.trim();
    const title = document.getElementById('p-title')?.value.trim();
    const link = document.getElementById('p-link')?.value.trim();
    const data = { category: activeCat, time: Date.now(), views: Math.floor(Math.random()*15)+5 };
    
    if (activeCat === 'INTERCAMBIO') { 
        if(!desc || !user) return; 
        if (/(http|https|www|\.com|t\.me)/i.test(desc)) { alert("❌ NO LINKS ALLOWED HERE"); return; }
        data.desc = desc; data.user = user; 
        db.ref('posts').push(data).then(() => closeModal('modal-pub'));
    } else { 
        if(!title || !link) return; 
        data.title = title; data.link = link;
        db.ref('posts').push(data).then(() => closeModal('modal-pub'));
    }
}

function accion(isEx, link, desc, user) {
    let url = (isEx === 'true') ? `https://t.me/${user.replace('@','')}?text=Intercambio: ${encodeURIComponent(desc)}` : (link.startsWith('http') ? link : 'https://' + link);
    window.open(url, '_blank');
}

function openGuide() {
    const t = langData[currentLang];
    document.getElementById('guide-steps').innerHTML = `
        <div class="guide-step"><div class="guide-icon"><i class="fas fa-shield-alt"></i></div><div class="guide-info"><h4>${t.g1T}</h4><p>${t.g1D}</p></div></div>
        <div class="guide-step"><div class="guide-icon"><i class="fas fa-link"></i></div><div class="guide-info"><h4>${t.g2T}</h4><p>${t.g2D}</p></div></div>
        <div class="guide-step"><div class="guide-icon"><i class="fas fa-sync-alt"></i></div><div class="guide-info"><h4>${t.g3T}</h4><p>${t.g3D}</p></div></div>`;
    document.getElementById('modal-guide').style.display = 'flex';
}

function filterCat(cat, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); loadData(cat);
}

function closeModal(id) { document.getElementById(id).style.display = 'none'; }

setInterval(() => {
    const el = document.getElementById('online-count');
    if(el) el.innerText = (2400 + Math.floor(Math.random()*80)).toLocaleString();
}, 4000);
</script>
</body>
</html>
