<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xgrab USDT - Network Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='10278425' data-sdk='show_10278425'></script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --neon: #00d4ff; --dark: #080a0c; --panel: #12161b; }
        body { margin: 0; padding: 0; background: var(--dark); color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; user-select: none; }
        #main-ui { padding: 25px; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; }
        .vault-card { background: linear-gradient(145deg, #12161b, #0a0c10); border-radius: 30px; padding: 35px 20px; text-align: center; border: 1px solid rgba(0, 212, 255, 0.1); margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .vault-amount { font-size: 45px; font-family: 'Orbitron'; font-weight: 900; color: var(--neon); text-shadow: 0 0 15px rgba(0, 212, 255, 0.3); }
        .btn-action { background: var(--neon); color: #000; width: 100%; padding: 20px; border-radius: 18px; border: none; font-family: 'Orbitron'; font-weight: 900; font-size: 15px; cursor: pointer; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: auto; padding-bottom: 10px; }
        .menu-item { background: var(--panel); border: 1px solid #1e252e; border-radius: 18px; padding: 18px; text-align: center; cursor: pointer; }
        .menu-item i { color: var(--neon); font-size: 18px; margin-bottom: 6px; display: block; }
        #game-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 2000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--panel); border: 1px solid var(--neon); border-radius: 25px; padding: 25px; width: 100%; text-align: center; box-sizing: border-box; }
        input { width: 100%; padding: 14px; margin: 12px 0; background: #000; border: 1px solid #333; border-radius: 10px; color: #fff; text-align: center; font-family: 'Rajdhani'; font-size: 14px; }
        .stats-box { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: left; border-left: 3px solid var(--neon); }
    </style>
</head>
<body>

    <div id="main-ui">
        <div style="display:flex; justify-content:space-between; font-size:10px; color:#555; font-weight:900; margin-bottom:10px;">
            <span>XGRAB NETWORK V6</span>
            <span>ID: <span id="display-id">---</span></span>
        </div>
        <div class="vault-card">
            <div style="font-family:'Orbitron'; font-size:9px; color:var(--neon); letter-spacing:2px;">BALANCE DISPONIBLE</div>
            <div class="vault-amount">$<span id="ui-balance">0.0000</span></div>
            <div style="font-size:10px; color:#444; margin-top:8px;">Minado diario: <span id="ads-count">0</span>/15</div>
        </div>
        <button class="btn-action" onclick="runCycle()"><i class="fas fa-bolt"></i> EXTRAER USDT</button>
        <div class="menu-grid">
            <div class="menu-item" onclick="openModal('withdraw')"><i class="fas fa-wallet"></i><span>RETIRAR</span></div>
            <div class="menu-item" onclick="openModal('ref')"><i class="fas fa-network-wired"></i><span>MI RED</span></div>
            <div class="menu-item" onclick="openModal('hist')"><i class="fas fa-file-invoice-dollar"></i><span>PAGOS</span></div>
            <div class="menu-item" style="opacity:0.2;"><i class="fas fa-user-shield"></i><span>ADMIN</span></div>
        </div>
    </div>

    <div id="sys-modal" class="modal"><div class="modal-content" id="modal-inner"></div></div>
    
    <div id="game-layer">
        <div style="position:absolute; top:25px; width:100%; display:flex; justify-content:space-around; color:var(--neon); font-family:'Orbitron'; font-size:13px; z-index:1001;">
            <span>$<span id="game-score">0.0000</span></span>
            <span><i class="fas fa-clock"></i> <span id="game-timer">40</span>s</span>
        </div>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        // CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyC5ObLcwYBLrwVU2ZNqCnBDgarTa88DFJE",
            authDomain: "fruithunter-b5d2d.firebaseapp.com",
            databaseURL: "https://fruithunter-b5d2d-default-rtdb.firebaseio.com",
            projectId: "fruithunter-b5d2d",
            storageBucket: "fruithunter-b5d2d.appspot.com",
            messagingSenderId: "910354867578",
            appId: "1:910354867578:web:30c5a30058c621116622c3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const TG_BOT = "XgrabUSDTbot", TOKEN = "7981775992:AAGmBMWU2jQEL_hstigComicKPUSAqM1qPg", CANAL = "@ALSKSNNSLSMS";

        let userUID = localStorage.getItem('xgrab_uid') || "USR" + Math.floor(Math.random()*89999 + 10000);
        localStorage.setItem('xgrab_uid', userUID);
        document.getElementById('display-id').innerText = userUID;

        // Capturar parámetros de referido
        const inviter = new URLSearchParams(window.location.search).get('start');

        let balance = 0, adsToday = 0;

        // Registro y Chismoso Inicial
        db.ref('users/' + userUID).once('value', snap => {
            if(!snap.exists()){
                const d = { balance: 0, adsToday: 0 };
                if(inviter && inviter !== userUID) d.invitedBy = inviter;
                db.ref('users/' + userUID).set(d);
                sendChisme(`🆕 *NUEVO MINERO*\nID: \`${userUID}\`\nMentor: \`${inviter || 'Registro Directo'}\``);
            }
        });

        // Monitor de Saldo
        db.ref('users/' + userUID).on('value', snap => {
            const d = snap.val() || { balance: 0, adsToday: 0 };
            balance = d.balance; adsToday = d.adsToday;
            document.getElementById('ui-balance').innerText = balance.toFixed(4);
            document.getElementById('ads-count').innerText = adsToday;
        });

        function runCycle() {
            if(adsToday >= 15) return alert("Límite de 15 alcanzado. Mañana más.");
            const ad = window.Adsgram.init({ blockId: "18897" });
            ad.show().then(() => {
                adsToday++;
                db.ref('users/' + userUID).update({ adsToday: adsToday });
                initGame();
            }).catch(() => alert("Error: Mira el anuncio completo."));
        }

        // MOTOR DEL JUEGO
        const cvs = document.getElementById('canvas'), ctx = cvs.getContext('2d');
        let gActive = false, gData = {};

        function initGame() {
            document.getElementById('game-layer').style.display = 'block';
            cvs.width = window.innerWidth; cvs.height = window.innerHeight;
            gData = { score: 0, time: 40, items: [], hook: { x: cvs.width/2, y: 80, ang: Math.PI/2, len: 80, state: 0, spd: 0.045, catch: null } };
            for(let i=0; i<8; i++) gData.items.push({x: Math.random()*cvs.width, y: 300+Math.random()*(cvs.height-450), r:16, val: 0.0005, type:'coin', mass:2});
            for(let i=0; i<3; i++) gData.items.push({x: Math.random()*cvs.width, y: 300+Math.random()*(cvs.height-450), r:35, val:0, type:'rock', mass:15});
            gActive = true; loop();
        }

        cvs.addEventListener('touchstart', (e) => { e.preventDefault(); if(gData.hook.state===0) gData.hook.state=1; });

        function loop() {
            if(!gActive) return;
            ctx.fillStyle = '#050505'; ctx.fillRect(0,0,cvs.width, cvs.height);
            let h = gData.hook;
            if(h.state === 0) { h.ang += h.spd; if(h.ang < 0.4 || h.ang > Math.PI - 0.4) h.spd *= -1; }
            else if(h.state === 1) {
                h.len += 15; if(h.len > cvs.height - 60) h.state = 2;
                let hx = h.x + Math.cos(h.ang)*h.len, hy = h.y + Math.sin(h.ang)*h.len;
                gData.items.forEach(it => { if(!it.caught && Math.hypot(hx-it.x, hy-it.y) < it.r + 15) { it.caught=true; h.catch=it; h.state=2; } });
            } else {
                h.len -= h.catch ? (25 / h.catch.mass) : 15;
                if(h.len <= 80) { h.len = 80; h.state = 0; if(h.catch) { gData.score += h.catch.val; h.catch=null; } }
            }
            let hx = h.x + Math.cos(h.ang)*h.len, hy = h.y + Math.sin(h.ang)*h.len;
            ctx.strokeStyle = '#00d4ff'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(h.x, h.y); ctx.lineTo(hx, hy); ctx.stroke();
            gData.items.forEach(it => { if(!it.caught) { ctx.beginPath(); ctx.arc(it.x, it.y, it.r, 0, 7); ctx.fillStyle = it.type === 'coin' ? '#00d4ff' : '#1a1a1a'; ctx.fill(); } });
            gData.time -= 0.016;
            document.getElementById('game-score').innerText = gData.score.toFixed(4);
            document.getElementById('game-timer').innerText = Math.ceil(gData.time);
            if(gData.time <= 0) {
                gActive = false;
                const gain = gData.score;
                db.ref('users/' + userUID + '/balance').transaction(b => (b || 0) + gain);
                db.ref('users/' + userUID + '/invitedBy').once('value', s => {
                    const boss = s.val();
                    if(boss) db.ref('users/' + boss + '/balance').transaction(b => (b || 0) + (gain * 0.1));
                });
                sendChisme(`⛏ *MINADO*\nID: \`${userUID}\`\nGanó: $${gain.toFixed(4)}`);
                document.getElementById('game-layer').style.display = 'none';
            } else requestAnimationFrame(loop);
        }

        // SISTEMA DE MODALES Y RED
        function openModal(type) {
            const inner = document.getElementById('modal-inner');
            if(type === 'ref') {
                const link = `https://t.me/${TG_BOT}?start=${userUID}`;
                inner.innerHTML = `
                    <h3 style="color:var(--neon); font-family:'Orbitron';">SOCIOS Y RED</h3>
                    <div class="stats-box">
                        <p style="margin:5px 0;">👥 Equipo: <b id="count-ref" style="color:var(--neon)">...</b></p>
                        <p style="margin:5px 0; font-size:10px; color:#666;" id="boss-id">Mentor: Cargando...</p>
                    </div>
                    <p style="font-size:11px; color:#777;">Comparte tu enlace y gana el 10% de comisión automática por cada sesión de tu equipo.</p>
                    <input type="text" value="${link}" id="refLink" readonly>
                    <button class="btn-action" onclick="copyRef()">COPIAR MI ENLACE</button>
                    <p onclick="closeModal()" style="margin-top:15px; color:#444; cursor:pointer;">CERRAR</p>
                `;
                loadNetwork();
            } else if(type === 'withdraw') {
                inner.innerHTML = `<h3>RETIRAR USDT</h3><p style="font-size:11px;">Mínimo $5.00 USDT (Polygon)</p>
                <input type="text" id="w-wallet" placeholder="Dirección Wallet 0x...">
                <button class="btn-action" onclick="requestPay()">ENVIAR SOLICITUD</button>
                <p onclick="closeModal()" style="margin-top:15px; color:#444; cursor:pointer;">CERRAR</p>`;
            } else if(type === 'hist') {
                inner.innerHTML = `<h3>HISTORIAL DE PAGOS</h3><div id="h-list" style="text-align:left; max-height:200px; overflow-y:auto; font-size:11px;">Cargando...</div>
                <button class="btn-action" style="margin-top:15px;" onclick="closeModal()">CERRAR</button>`;
                loadHist();
            }
            document.getElementById('sys-modal').style.display = 'flex';
        }

        function loadNetwork() {
            db.ref('users/' + userUID + '/invitedBy').once('value', s => {
                document.getElementById('boss-id').innerText = s.val() ? "Mentor: " + s.val() : "Mentor: Registro Orgánico";
            });
            db.ref('users').orderByChild('invitedBy').equalTo(userUID).on('value', s => {
                document.getElementById('count-ref').innerText = s.numChildren() || 0;
            });
        }

        function requestPay() {
            const w = document.getElementById('w-wallet').value;
            if(balance < 5) return alert("Mínimo $5.00");
            if(w.length < 20) return alert("Billetera inválida.");
            const amt = balance.toFixed(4), date = new Date().toLocaleString();
            sendChisme(`💰 *SOLICITUD RETIRO*\nID: \`${userUID}\`\nMonto: $${amt}\nWallet: \`${w}\``);
            const hRef = db.ref('users/' + userUID + '/historial').push();
            db.ref('users/' + userUID).update({ balance: 0 }).then(() => {
                hRef.set({ monto: amt, wallet: w, fecha: date, status: "ÉXITO" });
            });
            alert("¡Éxito! Tu retiro ha sido registrado.");
            closeModal();
        }

        function loadHist() {
            db.ref('users/' + userUID + '/historial').once('value', s => {
                const list = document.getElementById('h-list');
                if(!s.exists()) return list.innerHTML = "<p>Sin pagos registrados.</p>";
                let h = "";
                s.forEach(c => {
                    const v = c.val();
                    h += `<div style="border-bottom:1px solid #222; padding:8px 0;">
                        <b style="color:var(--neon)">$${v.monto} USDT</b> - <span style="color:#00ff00;">${v.status}</span><br>
                        <small style="color:#444;">${v.fecha}</small>
                    </div>`;
                });
                list.innerHTML = h;
            });
        }

        function sendChisme(m) { fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CANAL}&text=${encodeURIComponent(m)}&parse_mode=Markdown`); }
        function copyRef() { document.getElementById('refLink').select(); document.execCommand('copy'); alert("¡Enlace copiado!"); }
        function closeModal() { document.getElementById('sys-modal').style.display = 'none'; }
    </script>
</body>
</html>
