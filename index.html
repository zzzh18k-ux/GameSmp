<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X Exchange PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030305; --accent: #00f2ff; --card: rgba(255,255,255,0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* PANTALLA INICIAL DE IDIOMA */
        #lang-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .lang-card { background: #0a0a0a; border: 1px solid var(--accent); padding: 30px; border-radius: 30px; width: 100%; max-width: 350px; }
        .lang-option { background: var(--card); border: 1px solid #333; padding: 15px; border-radius: 15px; margin: 10px 0; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; }
        
        /* HEADER CON CONTADOR */
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .logo { font-family: 'Orbitron'; color: var(--accent); font-size: 18px; }
        .live-stat { color: #00ff88; font-size: 10px; font-weight: 800; animation: blink 1.5s infinite; }

        .categories { display: flex; gap: 10px; overflow-x: auto; padding: 15px; background: rgba(255,255,255,0.02); scrollbar-width: none; }
        .cat-btn { background: var(--card); border: 1px solid #222; color: #888; padding: 10px 15px; border-radius: 12px; font-size: 11px; white-space: nowrap; font-weight: bold; }
        .cat-btn.active { background: var(--accent); color: #000; border: none; box-shadow: 0 0 10px var(--accent); }

        .feed { flex: 1; overflow-y: scroll; padding: 15px; padding-bottom: 100px; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .card-meta { display: flex; justify-content: space-between; font-size: 10px; color: #555; margin-top: 10px; }
        
        .btn-main { background: #fff; color: #000; border: none; padding: 12px; width: 100%; border-radius: 12px; font-weight: 900; font-size: 12px; cursor: pointer; margin-top: 10px; }
        .btn-plus { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; width: 60px; height: 60px; border-radius: 20px; font-size: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(0,242,255,0.5); z-index: 1000; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; display: none; flex-direction: column; padding: 30px; justify-content: center; }
        .modal-box { background: #0a0a0a; border: 1px solid var(--accent); padding: 25px; border-radius: 25px; }
        input, select { background: #111; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 15px; margin-bottom: 15px; width: 100%; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="lang-overlay">
        <div class="lang-card">
            <h2 style="font-family:'Orbitron'; color:var(--accent); margin-bottom:20px;">X EXCHANGE</h2>
            <div class="lang-option" onclick="setInitialLang('es')">🇪🇸 ESPAÑOL</div>
            <div class="lang-option" onclick="setInitialLang('en')">🇺🇸 ENGLISH</div>
            <div class="lang-option" onclick="setInitialLang('ru')">🇷🇺 PУССКИЙ</div>
        </div>
    </div>

    <div id="welcome-modal" class="modal">
        <div class="modal-box">
            <h2 id="tr-w-h" style="font-family:'Orbitron'; color:var(--accent);"></h2>
            <p id="tr-w-p" style="font-size:13px; color:#bbb; margin: 20px 0;"></p>
            <button class="btn-main" id="tr-w-b" onclick="document.getElementById('welcome-modal').style.display='none'"></button>
        </div>
    </div>

    <div class="header">
        <div class="logo">X EXCHANGE</div>
        <div class="live-stat">● <span id="online-count">1,420</span> ONLINE</div>
    </div>

    <div class="categories">
        <button class="cat-btn active" id="tr-c-all" onclick="filterCat('TODOS', this)"></button>
        <button class="cat-btn" id="tr-c-bots" onclick="filterCat('BOTS', this)">🤖 BOTS</button>
        <button class="cat-btn" id="tr-c-ch" onclick="filterCat('CANALES', this)">📣 CANALES</button>
        <button class="cat-btn" id="tr-c-gr" onclick="filterCat('GRUPOS', this)">👥 GRUPOS</button>
    </div>

    <div class="feed" id="main-feed"></div>

    <button class="btn-plus" onclick="openPublish()"><i class="fas fa-plus"></i></button>

    <div id="modal-pub" class="modal">
        <div class="modal-box">
            <h2 id="tr-p-h" style="font-family:'Orbitron'; color:var(--accent); margin-bottom:15px;"></h2>
            <p id="tr-p-hint" style="font-size:10px; color:var(--accent); margin-bottom:10px;"></p>
            <select id="p-cat" onchange="updateHint()">
                <option value="BOTS">🤖 BOT DE TELEGRAM</option>
                <option value="CANALES">📣 CANAL / COMUNIDAD</option>
                <option value="GRUPOS">👥 GRUPO DE CHAT</option>
            </select>
            <input type="text" id="p-title">
            <input type="text" id="p-link" placeholder="https://t.me/...">
            <input type="text" id="p-user" placeholder="@Usuario">
            <button class="btn-main" id="tr-p-b" onclick="publicar()" style="background:var(--accent);"></button>
            <button onclick="document.getElementById('modal-pub').style.display='none'" id="tr-p-c" style="margin-top:15px; background:none; border:none; color:#666;"></button>
        </div>
    </div>

<script>
// CONFIG FIREBASE
const firebaseConfig = { apiKey: "AIzaSyC5ObLcwYBLrwVU2ZNqCnBDgarTa88DFJE", authDomain: "fruithunter-b5d2d.firebaseapp.com", databaseURL: "https://fruithunter-b5d2d-default-rtdb.firebaseio.com", projectId: "fruithunter-b5d2d", storageBucket: "fruithunter-b5d2d.appspot.com", messagingSenderId: "910354867578", appId: "1:910354867578:web:30c5a30058c621116622c3" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const langData = {
    es: { wH: "BIENVENIDO", wP: "En esta app puedes intercambiar referidos y canales. Otros usuarios te escribirán a tu Telegram. Si publicas en una categoría, asegúrate de que sea lo correcto.", wB: "ENTRAR", all: "CAMBIO DE COSAS", phTitle: "Escribe qué quieres cambiar...", pubH: "PUBLICAR", pubB: "SUBIR AHORA", close: "CERRAR", view: "VER INTERCAMBIO", hint: "SOLO SUBE CONTENIDO DE ESTA CATEGORÍA", msg: "Hola! Vi tu oferta en X Exchange. Me interesa:" },
    en: { wH: "WELCOME", wP: "Exchange referrals and channels here. Users will message you on Telegram. Make sure you post in the correct category.", wB: "ENTER", all: "EXCHANGE STUFF", phTitle: "What do you want to exchange?", pubH: "PUBLISH", pubB: "UPLOAD NOW", close: "CLOSE", view: "VIEW EXCHANGE", hint: "ONLY UPLOAD CONTENT FOR THIS CATEGORY", msg: "Hello! I saw your offer on X Exchange. I'm interested in:" },
    ru: { wH: "ДОБРО ПОЖАЛОВАТЬ", wP: "Обменивайтесь рефералами и каналами. Пользователи напишут вам в Telegram. Публикуйте строго в нужной категории.", wB: "ВХОД", all: "ОБМЕН ВЕЩАМИ", phTitle: "Что вы хотите обменять?", pubH: "ОПУБЛИКОВАТЬ", pubB: "ЗАГРУЗИТЬ", close: "ЗАКРЫТЬ", view: "ПОСМОТРЕТЬ", hint: "ЗАГРУЖАЙТЕ ТОЛЬКО ЭТУ КАТЕГОРИЮ", msg: "Привет! Я видел ваше предложение на X Exchange. Меня интересует:" }
};

let currentLang = 'es';

function setInitialLang(lang) {
    currentLang = lang;
    document.getElementById('lang-overlay').style.display = 'none';
    document.getElementById('welcome-modal').style.display = 'flex';
    
    const t = langData[lang];
    document.getElementById('tr-w-h').innerText = t.wH;
    document.getElementById('tr-w-p').innerText = t.wP;
    document.getElementById('tr-w-b').innerText = t.wB;
    document.getElementById('tr-c-all').innerText = t.all;
    document.getElementById('tr-p-h').innerText = t.pubH;
    document.getElementById('tr-p-b').innerText = t.pubB;
    document.getElementById('tr-p-c').innerText = t.close;
    document.getElementById('p-title').placeholder = t.phTitle;
    updateHint();
    loadData();
}

function updateHint() {
    document.getElementById('tr-p-hint').innerText = langData[currentLang].hint;
}

function loadData(category = 'TODOS') {
    db.ref('posts').on('value', snap => {
        const feed = document.getElementById('main-feed');
        feed.innerHTML = '';
        snap.forEach(child => {
            const p = child.val();
            if(category === 'TODOS' || p.category === category) {
                // Vistas falsas por post
                const randomViews = Math.floor(Math.random() * 500) + 100;
                feed.innerHTML += `
                <div class="card">
                    <span style="color:var(--accent); font-size:9px; font-weight:900;">${p.category}</span>
                    <div style="font-weight:800; margin:5px 0 15px 0;">${p.title}</div>
                    <button class="btn-main" onclick="ir('${p.link}', '${p.title}', '${p.user}')">${langData[currentLang].view}</button>
                    <div class="card-meta">
                        <span><i class="fas fa-eye"></i> ${randomViews} VIEWS</span>
                        <span><i class="fas fa-clock"></i> 24h</span>
                    </div>
                </div>`;
            }
        });
    });
}

function ir(link, title, user) {
    const msg = encodeURIComponent(`${langData[currentLang].msg} ${title} (@ReferralsXchangeBot)`);
    if(user.includes('@')) {
        window.open(`https://t.me/${user.replace('@','')}?text=${msg}`);
    } else { window.open(link); }
}

function publicar() {
    const data = {
        category: document.getElementById('p-cat').value,
        title: document.getElementById('p-title').value,
        link: document.getElementById('p-link').value,
        user: document.getElementById('p-user').value,
        time: new Date().getTime()
    };
    if(!data.title || !data.link) return;
    db.ref('posts').push(data).then(() => {
        document.getElementById('modal-pub').style.display = 'none';
    });
}

function openPublish() {
    document.getElementById('modal-pub').style.display = 'flex';
}

function filterCat(cat, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadData(cat);
}

// MOTOR DE ONLINE FALSO
setInterval(() => {
    document.getElementById('online-count').innerText = (1400 + Math.floor(Math.random()*300)).toLocaleString();
}, 3000);
</script>
</body>
</html>
