<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xgrab USDT - Sistema Blindado</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #f8f5f0; --panel: #ffffff; --accent: #c99b67; --gold: #b0895d; }
        body { background: var(--bg); font-family: 'Montserrat', sans-serif; margin: 0; padding: 20px; text-align: center; }
        .vault { background: var(--panel); border-radius: 25px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .amount { font-size: 40px; font-weight: 700; color: var(--gold); }
        .btn { background: linear-gradient(135deg, var(--accent), var(--gold)); color: white; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: 700; cursor: pointer; }
        .menu { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .item { background: white; padding: 15px; border-radius: 15px; font-size: 12px; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.95); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:1000; }
    </style>
</head>
<body>

<div class="vault">
    <div style="font-size:10px; color:#888;">BÓVEDA ACTIVA</div>
    <div class="amount">$<span id="ui-balance">0.000000</span></div>
    <div style="font-size:12px; margin-top:10px;">ID: <span id="display-id">...</span></div>
</div>

<button class="btn" onclick="mostrarAnuncio()">EJECUTAR PROTOCOLO</button>

<div class="menu" style="margin-top:20px;">
    <div class="item" onclick="abrirModal('ref')"><i class="fas fa-users"></i><br>Mi Red</div>
    <div class="item" onclick="abrirModal('info')"><i class="fas fa-info-circle"></i><br>Guía</div>
</div>

<div id="miModal" class="modal"></div>

<script>
// 1. CONFIGURACIÓN (SU BASE DE DATOS)
const firebaseConfig = { 
    apiKey: "AIzaSyC5ObLcwYBLrwVU2ZNqCnBDgarTa88DFJE", 
    authDomain: "fruithunter-b5d2d.firebaseapp.com", 
    databaseURL: "https://fruithunter-b5d2d-default-rtdb.firebaseio.com", 
    projectId: "fruithunter-b5d2d", 
    appId: "1:910354867578:web:30c5a30058c621116622c3" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const BOT_TOKEN = "7981775992:AAGmBMWU2jQEL_hstigComicKPUSAqM1qPg";
const CANAL_ID = "@ALSKSNNSLSMS";

// 2. IDENTIFICACIÓN Y REFERIDOS
let userUID = localStorage.getItem('xgrab_uid') || "USR" + Math.floor(Math.random()*89999+10000);
localStorage.setItem('xgrab_uid', userUID);
document.getElementById('display-id').innerText = userUID;

db.ref('users/' + userUID).on('value', snap => {
    const data = snap.val();
    if(!data) {
        // AQUÍ ESTÁ EL TRUCO: Le pedimos a Telegram el "start_param"
        const tg = window.Telegram.WebApp;
        const invitadoPor = tg.initDataUnsafe.start_param || null;

        db.ref('users/' + userUID).set({
            balance: 0.0001,
            invitedBy: invitadoPor,
            ads: 0
        }).then(() => {
            // EL CHISMOSO CANTA AQUÍ
            const mensaje = `👤 *NUEVO USUARIO*\n🆔 ID: \`${userUID}\` \n🔗 REF POR: ${invitadoPor || 'Nadie'}`;
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CANAL_ID}&text=${encodeURIComponent(mensaje)}&parse_mode=Markdown`);
        });
    } else {
        document.getElementById('ui-balance').innerText = (data.balance || 0).toFixed(6);
    }
});

function abrirModal(tipo) {
    const m = document.getElementById('miModal');
    if(tipo === 'ref') {
        const link = `https://t.me/XgrabUSDTbot/app?startapp=${userUID}`;
        m.innerHTML = `<h3>MI RED</h3><p>Invite socios y gane el 10%</p>
                       <input type="text" value="${link}" style="width:80%; padding:10px; text-align:center;" readonly>
                       <button class="btn" style="margin-top:10px;" onclick="cerrar()">CERRAR</button>`;
    } else {
        m.innerHTML = `<h3>GUÍA</h3><p>Vea anuncios y sume USDT a su bóveda.</p><button class="btn" onclick="cerrar()">CERRAR</button>`;
    }
    m.style.display = 'flex';
}

function cerrar() { document.getElementById('miModal').style.display = 'none'; }

function mostrarAnuncio() {
    const ad = window.Adsgram.init({ blockId: "18897" });
    ad.show().then(() => {
        db.ref('users/' + userUID).transaction(u => {
            if(u) { u.balance = (u.balance || 0) + 0.0008; u.ads = (u.ads || 0) + 1; }
            return u;
        });
    }).catch(() => alert("Anuncio no disponible"));
}
</script>
</body>
</html>
