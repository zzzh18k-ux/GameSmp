function init(l) {
    lang = l;
    const d = dictionary[lang];
    document.getElementById('lang-overlay').style.display = 'none';
    document.getElementById('app-container').style.display = 'flex';
    
    document.getElementById('btn-rules-ui').innerHTML = `<span>📋</span> ${d.rulesBtn}`;
    document.getElementById('t-ex').innerText = d.trades;
    document.getElementById('t-bo').innerText = d.bots;
    document.getElementById('t-ca').innerText = d.channels;
    document.getElementById('t-gr').innerText = d.groups;
    document.getElementById('p-title-ui').innerHTML = `<span>✨</span> ${d.newPost}`;
    document.getElementById('p-confirm-ui').innerHTML = `<span>📤</span> ${d.confirm}`;
    document.getElementById('p-cancel-ui').innerHTML = `<span>❌</span> ${d.cancel}`;
    
    syncData();
}

function msg(text) {
    const t = document.getElementById('toast-alert');
    t.innerText = text; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
}

function syncData() {
    db.ref('posts').on('value', snap => {
        let items = [];
        let counts = { INTERCAMBIO: 0, BOTS: 0, CANALES: 0, GRUPOS: 0 };
        const now = Date.now();
        snap.forEach(child => {
            const p = child.val();
            if (now - p.time > 86400000) { db.ref('posts').child(child.key).remove(); return; }
            counts[p.category]++;
            if(p.category === activeTab) items.push({ id: child.key, ...p });
        });
        const keys = { INTERCAMBIO: 'n-EX', BOTS: 'n-BO', CANALES: 'n-CA', GRUPOS: 'n-GR' };
        for(let k in keys) { 
            const el = document.getElementById(keys[k]);
            if(el) el.innerText = counts[k]; 
        }
        render(items.sort((a,b) => b.time - a.time));
    });
}

function render(list) {
    let html = "";
    list.forEach(p => {
        const isTrade = p.category === 'INTERCAMBIO';
        const d = dictionary[lang];
        html += `
        <div class="card-pro">
            <div class="card-content" 
                 onmousedown="startDelete('${p.id}')" onmouseup="stopDelete()" 
                 ontouchstart="startDelete('${p.id}')" ontouchend="stopDelete()">
                ${isTrade ? p.desc : p.title}
            </div>
            <button class="action-btn" onclick="go('${p.id}', '${isTrade}', '${p.link||''}', '${p.user||''}')">
                <span>${isTrade ? d.tradeBtn : d.viewBtn}</span>
            </button>
            <div class="card-meta">
                <span>👁️ ${p.views || 0} vistas</span>
                <span>⏰ 24h</span>
            </div>
        </div>`;
    });
    const feedEl = document.getElementById('feed-wall');
    feedEl.innerHTML = html || `<p style="text-align:center; padding:50px; color:var(--tg-hint);"><span>✨</span> No hay publicaciones aún</p>`;
}

function tab(name, btn) {
    document.querySelectorAll('.cat-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = name;
    syncData();
}

function showPost() {
    const fields = document.getElementById('post-fields');
    const d = dictionary[lang];
    const counterDiv = document.getElementById('char-count-display');
    
    if(activeTab === 'INTERCAMBIO') {
        fields.innerHTML = `
            <textarea id="in-desc" placeholder="${d.phDesc}" maxlength="${MAX_DESC_LENGTH}"></textarea>
            <input type="text" id="in-user" placeholder="${d.phUser}">
        `;
        counterDiv.style.display = 'block';
        const textarea = document.getElementById('in-desc');
        textarea.addEventListener('input', function() {
            counterDiv.innerText = `${this.value.length}/${MAX_DESC_LENGTH} caracteres`;
        });
        counterDiv.innerText = `0/${MAX_DESC_LENGTH} caracteres`;
    } else {
        fields.innerHTML = `
            <input type="text" id="in-title" placeholder="${d.phTitle}" maxlength="${MAX_TITLE_LENGTH}">
            <input type="text" id="in-link" placeholder="${d.phLink}">
        `;
        counterDiv.style.display = 'block';
        const titleInput = document.getElementById('in-title');
        titleInput.addEventListener('input', function() {
            counterDiv.innerText = `${this.value.length}/${MAX_TITLE_LENGTH} caracteres`;
        });
        counterDiv.innerText = `0/${MAX_TITLE_LENGTH} caracteres`;
    }
    document.getElementById('m-post').style.display = 'flex';
}

async function checkDuplicate(data) {
    const snapshot = await db.ref('posts').once('value');
    let isDuplicate = false;
    snapshot.forEach(child => {
        const p = child.val();
        const now = Date.now();
        if (now - p.time > 86400000) return;
        
        if (data.category === 'INTERCAMBIO') {
            if (p.category === 'INTERCAMBIO' && p.desc === data.desc && p.user === data.user) {
                isDuplicate = true;
            }
        } else {
            if (p.category === data.category && p.link === data.link) {
                isDuplicate = true;
            }
        }
    });
    return isDuplicate;
}

async function sendPost() {
    let data = { category: activeTab, time: Date.now(), views: 0 };
    const d = dictionary[lang];
    
    if(activeTab === 'INTERCAMBIO') {
        data.desc = document.getElementById('in-desc').value.trim();
        data.user = document.getElementById('in-user').value.trim();
        if(!data.desc || !data.user) return;
        if(data.desc.length > MAX_DESC_LENGTH) {
            msg(d.errMaxLength);
            return;
        }
        if (/(http|https|www|t\.me|telegram)/i.test(data.desc)) { 
            msg(d.errLink); 
            return; 
        }
    } else {
        data.title = document.getElementById('in-title').value.trim();
        data.link = document.getElementById('in-link').value.trim();
        if(!data.title || !data.link) return;
        if(data.title.length > MAX_TITLE_LENGTH) {
            msg(d.errMaxTitle);
            return;
        }
        if (!data.link.includes('t.me/')) {
            msg(d.errInvalidLink);
            return;
        }
    }
    
    const isDuplicate = await checkDuplicate(data);
    if (isDuplicate) {
        msg(d.errDuplicate);
        return;
    }
    
    if(typeof show_10747271 === 'function') show_10747271();
    db.ref('posts').push(data);
    msg(d.success);
    hideModal('m-post');
}

function go(id, isTrade, link, user) {
    db.ref('posts').child(id).child('views').transaction(v => (v || 0) + 1);
    clickCount++;
    if(clickCount % 4 === 0 && typeof show_10747271 === 'function') show_10747271();
    if(isTrade === 'true') {
        window.open(`https://t.me/${user.replace('@','')}`, '_blank');
    } else {
        let finalLink = link.includes('://') ? link : 'https://' + link;
        window.open(finalLink, '_blank');
    }
}
